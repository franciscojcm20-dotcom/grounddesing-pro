function renderConductorResults() {
  const c = state.conductor;
  const r = computeConductor(c);

  return `
    <div class="result-hero">
      <div class="stat-card primary">
        <div class="stat-label">Sección mínima requerida</div>
        <div class="stat-value">${fmt(r.areaMm2,2)}<span class="stat-unit">mm²</span></div>
        <div class="stat-note">Según ecuación de Onderdonk</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conductor ${r.esSeleccionManual ? 'seleccionado (manual)' : 'sugerido (automático)'}</div>
        <div class="stat-value" style="font-size:20px;">${r.seleccionado.calibre}</div>
        <div class="stat-note">${fmt(r.seleccionado.mm2,1)} mm² · margen +${fmt(r.margen,1)}%</div>
      </div>
    </div>

    <div class="verdict-banner ok">
      <span class="v-icon">✓</span>
      <span>El conductor ${r.seleccionado.calibre} cubre la sección mínima calculada con un margen de seguridad de ${fmt(r.margen,1)}%. ${r.esSeleccionManual
        ? 'Este calibre fue seleccionado manualmente y cumple la sección mínima requerida.'
        : 'Este es el calibre estándar más pequeño que cumple — en la práctica, suele preferirse el inmediatamente superior disponible en el mercado local. Puedes elegir manualmente otro calibre en el panel de entrada.'}</span>
    </div>

    <div class="section-title">Ecuación de Onderdonk <span class="norm-tag">IEEE 80-2013 · Cl. 11, Ec. 37</span></div>
    <p class="section-sub">Relaciona la corriente de falla, el tiempo de despeje, y el calentamiento adiabático del conductor para determinar la sección mínima que evita que el cobre alcance su temperatura límite.</p>
    <div class="calc-block">
      <div class="eq">A [mm²] <span class="op">=</span> (I<sub>g</sub>[kA] · 197.4) / √( (TCAP / (t·α<sub>r</sub>·ρ<sub>r</sub>)) · ln((K₀+T<sub>m</sub>)/(K₀+T<sub>a</sub>)) )</div>
      <div class="calc-row"><div class="ck">I<sub>g</sub> (corriente de falla)</div><div class="cv">${fmt(c.iFalla,0)} A <span class="ghost">(${fmt(c.iFalla/1000,3)} kA)</span></div></div>
      <div class="calc-row"><div class="ck">t (duración de falla)</div><div class="cv">${fmt(c.tFalla,2)} s</div></div>
      <div class="calc-row"><div class="ck">T<sub>a</sub> (ambiente)</div><div class="cv">${fmt(c.tempAmbiente,0)} °C</div></div>
      <div class="calc-row"><div class="ck">T<sub>m</sub> (máxima admisible)</div><div class="cv">${fmt(c.tempMaxFusion,0)} °C</div></div>
      <div class="calc-row"><div class="ck">TCAP (capacidad térmica, Cu)</div><div class="cv">${r.TCAP} cal/(cm³·°C)</div></div>
      <div class="calc-row"><div class="ck">α<sub>r</sub> (coef. térmico)</div><div class="cv">${r.alfa_r} /°C</div></div>
      <div class="calc-row"><div class="ck">ρ<sub>r</sub> (resistividad a 20°C)</div><div class="cv">${r.rho_r} µΩ·cm</div></div>
      <div class="calc-row"><div class="ck">ln((K₀+Tm)/(K₀+Ta))</div><div class="cv">${fmt(r.lnTerm,4)}</div></div>
      <div class="calc-row final"><div class="ck">A mínima resultante</div><div class="cv">${fmt(r.areaMm2,2)} mm²</div></div>
    </div>

    <div class="section-title">Tabla de conductores comerciales</div>
    <p class="section-sub">Calibres de cobre estándar y su área de sección transversal. Los calibres insuficientes están marcados como no seleccionables; elige el calibre real a instalar desde el panel de entrada.</p>
    <div class="calc-block" style="padding:0; overflow:hidden;">
      <table class="data-table">
        <thead><tr><th>Calibre</th><th>Área (mm²)</th><th>Estado</th></tr></thead>
        <tbody>
          ${CONDUCTOR_TABLE.map(row => {
            const esElegido = row.calibre === r.seleccionado.calibre;
            const insuficiente = row.mm2 < r.areaMm2;
            return `
            <tr style="${esElegido ? 'background:#E07A2314;' : ''} ${insuficiente ? 'opacity:0.5;' : ''}">
              <td class="${esElegido?'hl':''}">${row.calibre}</td>
              <td>${fmt(row.mm2,1)}</td>
              <td>${insuficiente
                ? '<span style="color:var(--danger);">✕ Insuficiente — no seleccionable</span>'
                : (esElegido ? `<span style="color:var(--safe);">✓ ${r.esSeleccionManual?'Seleccionado (manual)':'Seleccionado (automático)'}</span>` : '<span style="color:var(--text-faint);">Cumple (sobredimensionado)</span>')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${renderFundamentoTecnico('conductor')}

    <div class="footer-note">
      <b>Trazabilidad:</b> IEEE Std 80-2013, Cláusula 11.3 (ecuación de Onderdonk), con constantes de material de la Tabla 7 para cobre blando comercial (97% IACS). El criterio de T<sub>m</sub> debe ajustarse según el tipo de unión real del proyecto (soldada exotérmica vs. mecánica) — este prototipo usa 450°C como valor conservador por defecto.
    </div>
  `;
}

// MÓDULO: SCHLUMBERGER — RESULTADOS (comparado con Wenner)
// ---------------------------------------------------------------------
function renderSchlumbergerResults() {
  const cmp = compareWennerSchlumberger(state.wennerReadings, state.schlumbergerReadings);
  if (cmp.w.length < 2 || cmp.s.length < 2) {
    return `<div class="locked-pane"><div class="lock-icon">⊘</div><h3>Datos insuficientes</h3><p>Ingresa al menos 2 lecturas válidas en ambos métodos (Wenner y Schlumberger) para compararlos.</p></div>`;
  }

  const maxRho = Math.max(...cmp.w.map(p=>p.rho), ...cmp.s.map(p=>p.rho));
  const maxA = Math.max(...cmp.w.map(p=>p.a), ...cmp.s.map(p=>p.L));
  const svgW = 560, svgH = 280, pad = 45;
  const xScale = (a) => pad + (Math.log10(a+1) / Math.log10(maxA+1)) * (svgW - 2*pad);
  const yScale = (rho) => svgH - pad - (rho / maxRho) * (svgH - 2*pad);

  const pathW = cmp.w.map((p,i) => `${i===0?'M':'L'} ${xScale(p.a)} ${yScale(p.rho)}`).join(' ');
  const pathS = cmp.s.map((p,i) => `${i===0?'M':'L'} ${xScale(p.L)} ${yScale(p.rho)}`).join(' ');

  return `
    <div class="diagram-card">
      <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
        <line x1="${pad}" y1="${svgH-pad}" x2="${svgW-pad}" y2="${svgH-pad}" stroke="#3a4250" stroke-width="1"/>
        <line x1="${pad}" y1="${pad-10}" x2="${pad}" y2="${svgH-pad}" stroke="#3a4250" stroke-width="1"/>
        <path d="${pathW}" fill="none" stroke="#E07A23" stroke-width="2"/>
        ${cmp.w.map(p => `<circle cx="${xScale(p.a)}" cy="${yScale(p.rho)}" r="3" fill="#E07A23"/>`).join('')}
        <path d="${pathS}" fill="none" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"/>
        ${cmp.s.map(p => `<circle cx="${xScale(p.L)}" cy="${yScale(p.rho)}" r="3" fill="#2E7D32"/>`).join('')}
        <text x="${pad}" y="${svgH-10}" font-family="IBM Plex Sans" font-size="9.5" fill="#6b7480">Espaciamiento (escala log) →</text>
        <g transform="translate(${svgW-180},${pad-2})">
          <line x1="0" y1="0" x2="16" y2="0" stroke="#E07A23" stroke-width="2"/>
          <text x="21" y="3.5" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad">Wenner</text>
          <line x1="0" y1="16" x2="16" y2="16" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"/>
          <text x="21" y="19.5" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad">Schlumberger</text>
        </g>
      </svg>
    </div>

    <div class="result-hero">
      <div class="stat-card">
        <div class="stat-label">ρ promedio — Wenner</div>
        <div class="stat-value">${fmt(cmp.avgW,1)}<span class="stat-unit">Ω·m</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ρ promedio — Schlumberger</div>
        <div class="stat-value">${fmt(cmp.avgS,1)}<span class="stat-unit">Ω·m</span></div>
      </div>
      <div class="stat-card primary">
        <div class="stat-label">Diferencia entre métodos</div>
        <div class="stat-value">${cmp.diffPct>=0?'+':''}${fmt(cmp.diffPct,1)}<span class="stat-unit">%</span></div>
        <div class="stat-note">Schlumberger vs. Wenner</div>
      </div>
    </div>

    <div class="section-title">Cuándo usar cada método</div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">Wenner</div><div class="cv" style="font-size:12.5px; font-family:var(--sans);">Más simple en terreno (un solo espaciamiento 'a' para los 4 electrodos). Más sensible a heterogeneidades laterales superficiales — mover los 4 electrodos cada lectura aumenta el riesgo de error de campo.</div></div>
      <div class="calc-row"><div class="ck">Schlumberger</div><div class="cv" style="font-size:12.5px; font-family:var(--sans);">Los electrodos de potencial (MN) permanecen fijos mientras se abren los de corriente (AB) — menos movimientos de cable, sondeos más profundos más rápido, y generalmente menor ruido para SEV de varias capas. Es la base de las curvas patrón de Orellana-Mooney.</div></div>
      <div class="calc-row final"><div class="ck">Ecuaciones</div><div class="cv" style="font-size:12px;">Wenner: ρₐ=2πaR &nbsp;·&nbsp; Schlumberger: ρₐ=π(L²−ℓ²)/(2ℓ)·R</div></div>
    </div>

    <div class="footer-note">
      <b>Trazabilidad:</b> IEEE Std 81-2012, Cláusula 8. La ecuación de Schlumberger usada es la forma exacta (Telford, Geldart & Sheriff, "Applied Geophysics"); la forma aproximada πL²R/ℓ es válida solo cuando L≫ℓ.
    </div>
  `;
}

function renderCurvasPatronResults() {
  const cp = state.curvaPatron;
  const readings = state.wennerReadings.filter(r => r.a > 0 && r.r > 0);
  if (readings.length < 3) {
    return `<div class="locked-pane"><div class="lock-icon">⊘</div><h3>Datos insuficientes</h3><p>Se necesitan al menos 3 lecturas válidas en el módulo Wenner para comparar contra las curvas patrón de N capas.</p></div>`;
  }

  const N = cp.nCapas;
  const rhos = cp.rhos.slice(0, N);
  const hs = cp.hs.slice(0, N-1);

  // Curva teórica del modelo N capas usando Wait recursivo
  const aMin = 0.5, aMax = Math.max(...readings.map(r=>r.a)) * 1.5;
  const nPts = 60;
  const theoryCurve = [];
  for (let i = 0; i <= nPts; i++) {
    const logA = Math.log10(aMin) + (i/nPts) * (Math.log10(aMax) - Math.log10(aMin));
    const a = Math.pow(10, logA);
    const rhoA = wennerApparentNLayer(a, rhos, hs);
    theoryCurve.push({ a, rhoA });
  }

  // Datos de campo reales (Wenner)
  const fieldPts = readings.map(r => ({ a: r.a, rhoA: wennerApparent(r.a, r.r) }));

  // También curvas de referencia de 2 capas para contexto (k=1,3,10)
  const refKs = N === 2 ? [] : [1, 3, 10];
  const refCurves = refKs.map(k => {
    const pts = [];
    for (let i = 0; i <= 40; i++) {
      const logA = Math.log10(aMin) + (i/40) * (Math.log10(aMax) - Math.log10(aMin));
      const a = Math.pow(10, logA);
      pts.push({ a, rhoA: wennerApparentNLayer(a, [rhos[0], rhos[0]*k], [hs[0]||4]) });
    }
    return { k, pts };
  });

  // SVG en escala log-log
  const svgW = 580, svgH = 340, padL=55, padR=20, padT=30, padB=38;
  const allRhos = [...theoryCurve.map(p=>p.rhoA), ...fieldPts.map(p=>p.rhoA)].filter(v=>v>0&&isFinite(v));
  const allAs = [...theoryCurve.map(p=>p.a), ...fieldPts.map(p=>p.a)];
  const logXMin = Math.log10(Math.min(...allAs)*0.8), logXMax = Math.log10(Math.max(...allAs)*1.3);
  const logYMin = Math.log10(Math.min(...allRhos)*0.7), logYMax = Math.log10(Math.max(...allRhos)*1.4);
  const xp = a => padL + (Math.log10(a)-logXMin)/(logXMax-logXMin) * (svgW-padL-padR);
  const yp = r => (svgH-padB) - (Math.log10(r)-logYMin)/(logYMax-logYMin) * (svgH-padT-padB);

  // Grilla log-log
  let grid = '';
  const xDecades = [], yDecades = [];
  for (let d = Math.floor(logXMin); d <= Math.ceil(logXMax); d++) xDecades.push(d);
  for (let d = Math.floor(logYMin); d <= Math.ceil(logYMax); d++) yDecades.push(d);
  xDecades.forEach(d => {
    const x = xp(Math.pow(10,d));
    grid += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${svgH-padB}" stroke="#252d38" stroke-width="0.8"/>`;
    if (x > padL && x < svgW-padR) grid += `<text x="${x}" y="${svgH-padB+14}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#6b7480">${Math.pow(10,d)}</text>`;
    for (let m=2;m<10;m++) {
      const xm = xp(m*Math.pow(10,d));
      if (xm>padL && xm<svgW-padR) grid += `<line x1="${xm}" y1="${padT}" x2="${xm}" y2="${svgH-padB}" stroke="#1f2730" stroke-width="0.4"/>`;
    }
  });
  yDecades.forEach(d => {
    const y = yp(Math.pow(10,d));
    grid += `<line x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}" stroke="#252d38" stroke-width="0.8"/>`;
    if (y > padT && y < svgH-padB) grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" font-family="IBM Plex Mono" font-size="9" fill="#6b7480">${Math.pow(10,d)}</text>`;
    for (let m=2;m<10;m++) {
      const ym = yp(m*Math.pow(10,d));
      if (ym>padT && ym<svgH-padB) grid += `<line x1="${padL}" y1="${ym}" x2="${svgW-padR}" y2="${ym}" stroke="#1f2730" stroke-width="0.4"/>`;
    }
  });

  // Curvas de referencia (2 capas, trazo fino)
  const REFCOLORS = ['#4a5a6a','#5a6e82','#3a4e5e'];
  const refSvg = refCurves.map((rc,ci) => {
    const d = rc.pts.filter(p=>p.rhoA>0&&isFinite(p.rhoA)).map((p,i)=>`${i===0?'M':'L'} ${xp(p.a).toFixed(1)} ${yp(p.rhoA).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${REFCOLORS[ci]}" stroke-width="1.1" stroke-dasharray="4,3" opacity="0.7"/>
            <text x="${xp(rc.pts[rc.pts.length-1].a)+4}" y="${yp(rc.pts[rc.pts.length-1].rhoA)}" font-family="IBM Plex Mono" font-size="8" fill="${REFCOLORS[ci]}">k=${rc.k}</text>`;
  }).join('');

  // Curva teórica de N capas (trazo principal)
  const theoryPath = theoryCurve.filter(p=>p.rhoA>0&&isFinite(p.rhoA)).map((p,i)=>`${i===0?'M':'L'} ${xp(p.a).toFixed(1)} ${yp(p.rhoA).toFixed(1)}`).join(' ');

  // Puntos de campo
  const fieldSvg = fieldPts.map(p => p.rhoA>0 ? `<circle cx="${xp(p.a).toFixed(1)}" cy="${yp(p.rhoA).toFixed(1)}" r="5" fill="#2E7D32" stroke="#161a20" stroke-width="1.5"/>` : '').join('');

  // Leyenda de capas
  const layerColors = ['#E07A23','#e8ab6a','#c25e28','#a83d0c'];
  const COLORES_SUELO = ['#E07A23','#c99a5a','#b87840','#a06030'];

  const soilDescriptions = rhos.map((rho, i) => {
    const soil = classifySoil(rho);
    return `${soil.nombre} (ρ=${rho} Ω·m)${i < hs.length ? `, h=${hs[i]}m` : ' [semi-inf.]'}`;
  });

  return `
    <div class="diagram-card" style="background:#161a20;">
      <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
        ${grid}
        <rect x="${padL}" y="${padT}" width="${svgW-padL-padR}" height="${svgH-padT-padB}" fill="none" stroke="#3a4250" stroke-width="1.2"/>
        ${refSvg}
        <path d="${theoryPath}" fill="none" stroke="#E07A23" stroke-width="2.6"/>
        ${fieldSvg}
        <!-- Eje labels -->
        <text x="${padL+(svgW-padL-padR)/2}" y="${svgH-4}" text-anchor="middle" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad">Espaciamiento a (m) — escala log</text>
        <text x="12" y="${padT+(svgH-padT-padB)/2}" text-anchor="middle" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad" transform="rotate(-90 12 ${padT+(svgH-padT-padB)/2})">ρa (Ω·m) — escala log</text>
        <!-- Leyenda -->
        <g transform="translate(${padL+8},${padT+6})">
          <line x1="0" y1="0" x2="14" y2="0" stroke="#E07A23" stroke-width="2.6"/>
          <text x="19" y="3.5" font-family="IBM Plex Sans" font-size="9.5" fill="#e0d0c0">Modelo ${N} capas (Wait)</text>
          <circle cx="7" cy="16" r="5" fill="#2E7D32"/>
          <text x="19" y="19.5" font-family="IBM Plex Sans" font-size="9.5" fill="#e0d0c0">Datos de campo (Wenner)</text>
          ${N<3?`<line x1="0" y1="32" x2="14" y2="32" stroke="#4a5a6a" stroke-width="1.1" stroke-dasharray="4,3"/>
          <text x="19" y="35.5" font-family="IBM Plex Sans" font-size="9.5" fill="#8a9aaa">Ref. 2 capas (k=1,3,10)</text>`:''}
        </g>
        <!-- Título -->
        <text x="${svgW/2}" y="${padT-12}" text-anchor="middle" font-family="IBM Plex Sans Condensed" font-weight="700" font-size="12" fill="#e7e9ec">Curvas patrón SEV — modelo de ${N} estratos · Kernel de Wait (1954)</text>
      </svg>
    </div>

    <div class="result-hero">
      ${rhos.map((rho, i) => {
        const soil = classifySoil(rho);
        return `<div class="stat-card ${i===0?'primary':''}">
          <div class="stat-label">ρ${i+1} — Capa ${i+1}${i===N-1?' (base)':''}</div>
          <div class="stat-value">${fmt(rho,0)}<span class="stat-unit">Ω·m</span></div>
          <div class="stat-note">${soil.nombre}${i<hs.length?` · h=${hs[i]}m`:''}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Clasificación de suelos según normas internacionales</div>
    <p class="section-sub">Referencia: IEC 60364-5-54, IEEE 80, CIGRE WG B3.25. La resistividad del suelo varía varios órdenes de magnitud según el tipo y estado de humedad.</p>
    <div class="calc-block" style="padding:0; overflow:hidden; overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Tipo de suelo</th><th>ρ mín (Ω·m)</th><th>ρ máx (Ω·m)</th><th>Clase</th></tr></thead>
        <tbody>
          ${SOIL_TYPES.map(s => `
            <tr style="${rhos.some(r=>r>=s.rhoMin&&r<s.rhoMax)?'background:#E07A2314;':''}">
              <td${rhos.some(r=>r>=s.rhoMin&&r<s.rhoMax)?' class="hl"':''}>${s.nombre}</td>
              <td>${s.rhoMin}</td><td>${s.rhoMax}</td>
              <td><span class="norm-tag">${s.clase}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="section-title">Motor de cálculo — Kernel recursivo de Wait</div>
    <p class="section-sub">Fórmula general para N capas (Wenner). Para 2 capas recupera la expresión de Stefanescu/Orellana-Mooney. Para 3-4 capas no existen cartillas impresas publicadas — se integra numéricamente.</p>
    <div class="calc-block">
      <div class="eq">ρa = ρ₁ · [1 + 2a · ∫₀^∞ (T₁(λ)/ρ₁ − 1) · J₁(λa) · λ · dλ]</div>
      <div class="calc-row"><div class="ck">T₁(λ) — recursión</div><div class="cv">Tᵢ(λ) = ρᵢ · (Tᵢ₊₁ + ρᵢ·tanh(λhᵢ)) / (ρᵢ + Tᵢ₊₁·tanh(λhᵢ))</div></div>
      <div class="calc-row"><div class="ck">T_N(λ) — condición base</div><div class="cv">T_N = ρ_N (capa semi-infinita)</div></div>
      <div class="calc-row final"><div class="ck">Método de integración</div><div class="cv">Cuadratura rectangular 150 pts (log-espaciado) · J₁ por A&S 9.4</div></div>
    </div>

    <div class="footer-note">
      <b>Trazabilidad:</b> Wait, J.R. (1954) "Mutual electromagnetic coupling of loops". Telford, Geldart & Sheriff, "Applied Geophysics" (2nd ed.), Cl. 8. Para 2 capas equivale exactamente a la función de Stefanescu base de las cartillas Orellana-Mooney (1966). Para 3-4 capas existen tablas CGG (Compagnie Générale de Géophysique) de uso limitado; lo estándar hoy es la inversión numérica. Este prototipo implementa la integración directa del kernel de Wait, que es matemáticamente correcto para cualquier número de capas.
    </div>
  `;
}

// MÓDULO: ADITIVO GEL QUÍMICO — RESULTADOS

function renderGelResults() {
  const g = state.gel;
  const rhoSuelo = state.malla.rho;
  const r = computeGel(g, rhoSuelo);

  return `
    <div class="result-hero">
      <div class="stat-card">
        <div class="stat-label">R sin tratar (suelo nativo)</div>
        <div class="stat-value">${fmt(r.Rsin,2)}<span class="stat-unit">Ω</span></div>
        <div class="stat-note">Fórmula de Dwight, varilla desnuda</div>
      </div>
      <div class="stat-card primary">
        <div class="stat-label">R con gel químico</div>
        <div class="stat-value">${fmt(r.Rtotal,2)}<span class="stat-unit">Ω</span></div>
        <div class="stat-note">Mejora: ${fmt(r.mejoraPct,1)}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ρ efectiva equivalente</div>
        <div class="stat-value">${fmt(r.rhoEff,1)}<span class="stat-unit">Ω·m</span></div>
        <div class="stat-note">vs. ${fmt(rhoSuelo,1)} Ω·m nativa</div>
      </div>
    </div>

    <div class="verdict-banner ${g.activo ? 'ok' : 'warn'}">
      <span class="v-icon">${g.activo?'✓':'!'}</span>
      <span>${g.activo
        ? `El aditivo gel está ACTIVO: el módulo de malla usará ρ efectiva de ${fmt(r.rhoEff,1)} Ω·m en lugar de la resistividad nativa de ${fmt(rhoSuelo,1)} Ω·m, propagando una mejora de ${fmt(r.mejoraPct,1)}% al cálculo de resistencia de malla completo.`
        : 'El aditivo gel está calculado pero INACTIVO. Activa el toggle "Con gel químico" arriba para que este mejoramiento se propague al módulo de Resistencia de Malla.'}</span>
    </div>

    <div class="section-title">Modelo de electrodo con funda de gel (cilindros concéntricos)</div>
    <p class="section-sub">El gel actúa como una capa de transición de baja resistividad entre el conductor metálico y el suelo nativo, modelada como dos resistencias en serie: la "funda" de gel y el suelo nativo visto desde el radio exterior de esa funda.</p>
    <div class="calc-block">
      <div class="eq">R<sub>funda</sub> <span class="op">=</span> ρ<sub>gel</sub> / (2πL) · ln(r<sub>gel</sub>/r<sub>varilla</sub>)</div>
      <div class="calc-row"><div class="ck">ρ<sub>gel</sub></div><div class="cv">${fmt(g.rhoGel,2)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">r<sub>varilla</sub> / r<sub>gel</sub></div><div class="cv">${fmt(g.radioVarilla,4)} m / ${fmt(g.radioConGel,3)} m</div></div>
      <div class="calc-row final"><div class="ck">R<sub>funda</sub> resultante</div><div class="cv">${fmt(r.Rfunda,4)} Ω</div></div>
    </div>
    <div class="calc-block">
      <div class="eq">R<sub>suelo</sub> <span class="op">=</span> ρ<sub>suelo</sub> / (2πL) · [ ln(8L/(2·r<sub>gel</sub>)) − 1 ]</div>
      <div class="calc-row"><div class="ck">ρ<sub>suelo</sub> (nativa)</div><div class="cv">${fmt(rhoSuelo,1)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">L (longitud varilla)</div><div class="cv">${fmt(g.longVarillaGel,1)} m</div></div>
      <div class="calc-row final"><div class="ck">R<sub>suelo</sub> resultante</div><div class="cv">${fmt(r.Rsuelo,3)} Ω</div></div>
    </div>
    <div class="calc-block">
      <div class="eq">R<sub>total</sub> <span class="op">=</span> R<sub>funda</sub> + R<sub>suelo</sub></div>
      <div class="calc-row"><div class="ck">R sin gel (referencia, Dwight)</div><div class="cv">${fmt(r.Rsin,3)} Ω</div></div>
      <div class="calc-row final"><div class="ck">R con gel</div><div class="cv">${fmt(r.Rtotal,3)} Ω</div></div>
    </div>

    <div class="section-title">Propagación al cálculo de malla</div>
    <p class="section-sub">Para usar este mejoramiento en el cálculo de la malla completa (ecuación de Sverak), se calcula una resistividad efectiva equivalente: la resistividad nativa hipotética que, sin gel, produciría la misma R<sub>total</sub> con la fórmula estándar de Dwight.</p>
    <div class="calc-block">
      <div class="eq">ρ<sub>eff</sub> <span class="op">=</span> R<sub>total</sub> / [ (1/(2πL))·(ln(8L/d) − 1) ]</div>
      <div class="calc-row final"><div class="ck">ρ<sub>eff</sub> resultante</div><div class="cv">${fmt(r.rhoEff,1)} Ω·m</div></div>
    </div>

    <div class="footer-note">
      <b>Trazabilidad:</b> Modelo de electrodo vertical de Dwight (1936) / Sunde, extendido con aproximación de cilindros concéntricos para la funda de gel — analogía estándar usada en literatura de mejoramiento de puestas a tierra (geles de bentonita y aditivos químicos conductivos). No es una norma IEEE específica; los fabricantes de gel suelen reportar reducciones de resistencia empíricas de 30-70% según tipo de suelo, consistentes en orden de magnitud con este modelo.
    </div>
  `;
}

              <td style="font-size:11.5px; color:var(--text-dim);">${n.desc}</td>
              <td>${n.implementado
                ? '<span style="color:var(--safe); font-weight:600;">✓ Implementado y calculado</span>'
                : '<span style="color:var(--text-faint);">○ No implementado (referencia)</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="section-title" style="margin-top:20px;">¿Qué significa "implementado" aquí?</div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">Implementado</div><div class="cv" style="font-size:12px; font-family:var(--sans);">Las ecuaciones de la norma están codificadas, verificadas numéricamente, y son las que efectivamente calculan los resultados que ves en los módulos de Wenner, Schlumberger, Malla, Tensiones y Conductor.</div></div>
      <div class="calc-row final"><div class="ck">No implementado</div><div class="cv" style="font-size:12px; font-family:var(--sans);">Solo aparece el nombre y descripción de la norma como referencia de cobertura futura. Ningún resultado de este prototipo se calcula con esa normativa — agregarla requeriría codificar e verificar sus ecuaciones específicas, que pueden diferir sustancialmente de IEEE 80/81.</div></div>
    </div>

    <div class="footer-note">
      Ampliar la cobertura normativa real (no solo el listado) es un trabajo de validación técnica significativo para cada norma — las ecuaciones, factores de seguridad y criterios de aceptación pueden variar entre IEEE, IEC, NFPA y las normativas nacionales listadas.
    </div>
  `;
}

  return `
    <div class="mockup-banner">
      <span class="mb-icon">◇</span>
      <span class="mb-text"><b>Pantalla de maqueta.</b> Ningún botón procesa un pago real ni mueve dinero. Una pasarela de pago verdadera (tarjetas, renovación automática, facturación) requiere integración con un proveedor certificado (ej. Webpay, Stripe) y backend propio — fuera del alcance de este prototipo.</span>
    </div>

    <div style="text-align:center; margin-bottom:30px;">
      <h2 class="panel-title" style="font-size:22px; margin-bottom:6px;">Planes de GroundDesing Pro</h2>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:18px;" class="plans-grid">

          <div style="font-family:var(--cond); font-weight:700; font-size:17px; color:var(--text); margin-bottom:4px;">${plan.nombre}</div>
          <div style="font-size:11.5px; color:var(--text-faint); margin-bottom:18px;">${plan.tagline}</div>
          <div style="margin-bottom:20px;">
            ${plan.precioMes === null
              ? `<div style="font-family:var(--cond); font-weight:700; font-size:22px; color:var(--text);">A medida</div><div style="font-size:11px; color:var(--text-faint);">Contacta a ventas</div>`
              : plan.precioMes === 0
                ? `<div style="font-family:var(--mono); font-weight:600; font-size:28px; color:var(--text);">$0</div><div style="font-size:11px; color:var(--text-faint);">para siempre</div>`
                : `<div style="font-family:var(--mono); font-weight:600; font-size:28px; color:var(--copper);">${fmtCLP(plan.precioMes)}<span style="font-size:13px; color:var(--text-faint); font-weight:400;">/mes</span></div><div style="font-size:11px; color:var(--text-faint);">${fmtCLP(plan.precioAnual)}/mes facturado anual</div>`

          <div style="flex:1;">

              <div class="perm-item ${f.ok?'granted':'denied'}" style="margin-bottom:7px; background:transparent; border:none; padding:4px 0;">
                <span class="pi-icon">${f.ok?'✓':'—'}</span><span>${f.label}</span>
              </div>

          </div>
          <button class="${plan.destacado?'new-project-btn':'secondary-btn'}" style="width:100%; margin-top:18px;" data-select-plan="${plan.id}">
            ${plan.precioMes === null ? 'Contactar a ventas (demo)' : plan.precioMes === 0 ? 'Plan actual' : 'Suscribirme (demo)'}
          </button>

    <style>@media (max-width:900px){ .plans-grid{ grid-template-columns:1fr !important; } }</style>

    <div class="footer-note" style="margin-top:30px;">
      Los precios mostrados son de referencia en pesos chilenos (CLP), sin IVA. En el sistema comercial real, esta pantalla se conectaría a una pasarela de pago certificada y a un sistema de facturación electrónica (SII, en el caso chileno).
    </div>
  `;
}

// ---------------------------------------------------------------------
// MEMORIA TÉCNICA (resumen consolidado de los 4 módulos de cálculo)
// ---------------------------------------------------------------------
function renderMemoria() {
  const w = state.wennerReadings.filter(r => r.a > 0 && r.r > 0).map(r => ({ ...r, rho: wennerApparent(r.a, r.r) }));
  const avgRho = w.length ? w.reduce((s,c)=>s+c.rho,0) / w.length : 0;
  const gelInfo = state.gel.activo ? computeGel(state.gel, state.malla.rho) : null;
  const rMalla = computeMalla(state.malla, gelInfo);
  const rTension = computeTensiones(state.tensiones, state.malla, state.conductor);
  const rCond = computeConductor(state.conductor);
  const mat = computeMateriales(state.malla, state.gel, state.conductor);
  const costos = computeCostos(mat, state.materiales);
  const fmtCLP = v => '$ ' + Math.round(v).toLocaleString('es-CL');
  const user = getCurrentUser();
  const N = state.curvaPatron.nCapas;
  const rhos = state.curvaPatron.rhos.slice(0, N);
  const hs = state.curvaPatron.hs.slice(0, N-1);

  return `
    <div class="mockup-banner">
      <span class="mb-icon">◇</span>
      <span class="mb-text"><b>Vista previa de memoria técnica.</b> Resume los resultados actuales de todos los módulos de cálculo, incluyendo los ajustes hechos por el usuario (geometría de malla, gel químico, calibre de conductor). El botón descarga un PDF real generado por GroundDesing Pro.</span>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px;">
      <div>
        <h2 class="panel-title" style="margin-bottom:2px;">Memoria de cálculo — Sistema de Puesta a Tierra</h2>
        <p class="panel-desc" style="margin-bottom:0;">Generada por ${user.nombre} · ${new Date().toLocaleDateString('es-CL', { year:'numeric', month:'long', day:'numeric' })}</p>
      </div>
      <button class="new-project-btn" id="download-memoria-btn">⬇ Descargar PDF</button>
    </div>

    ${(() => {
      const cumpleGlobal = rTension.touchOk && rTension.stepOk && rMalla.gpr < 5000;
      return `
      <div class="verdict-banner ${cumpleGlobal?'ok':'warn'}" style="margin-bottom:22px;">
        <span class="v-icon">${cumpleGlobal?'✓':'!'}</span>
        <span>${cumpleGlobal
          ? '<b>Estado consolidado: CUMPLE</b> — con la configuración actual (geometría de malla, gel químico y calibre de conductor elegidos por el usuario), el diseño satisface los límites de tensión de paso, contacto y GPR.'
          : '<b>Estado consolidado: NO CUMPLE</b> — con la configuración actual, el diseño aún no satisface todos los límites normativos. Ajusta la geometría de la malla, activa el aditivo gel químico, o modifica otros parámetros hasta alcanzar el cumplimiento antes de finalizar el diseño.'}</span>
      </div>`;
    })()}

    <div class="section-title">1. Resistividad del suelo <span class="norm-tag">IEEE 81-2012 · Wenner</span></div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">Lecturas válidas</div><div class="cv">${w.length}</div></div>
      <div class="calc-row final"><div class="ck">ρ promedio</div><div class="cv">${fmt(avgRho,1)} Ω·m</div></div>
    </div>

    <div class="section-title">2. Estratificación del suelo — ${N} capas <span class="norm-tag">Kernel de Wait</span></div>
    <div class="calc-block">
      ${rhos.map((rho,i) => {
        const soil = classifySoil(rho);
        return `<div class="calc-row"><div class="ck">Capa ${i+1}${i===N-1?' (base)':''}</div><div class="cv">${rho} Ω·m${i<hs.length?` · h=${hs[i]}m`:''} — ${soil.nombre}</div></div>`;
      }).join('')}
    </div>

    <div class="section-title">3. Aditivo gel químico <span class="norm-tag">${gelInfo?'ACTIVO':'Inactivo'}</span></div>
    <div class="calc-block">
      ${gelInfo
        ? `<div class="calc-row"><div class="ck">Mejora</div><div class="cv">${fmt(gelInfo.mejoraPct,1)}%</div></div>
           <div class="calc-row final"><div class="ck">ρ efectiva</div><div class="cv">${fmt(gelInfo.rhoEff,1)} Ω·m</div></div>`
        : `<div class="calc-row final"><div class="ck">Resistividad usada</div><div class="cv">${fmt(state.malla.rho,1)} Ω·m (nativa)</div></div>`}
    </div>

    <div class="section-title">4. Resistencia de malla <span class="norm-tag">IEEE 80-2013 Cl.14</span></div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">Dimensiones</div><div class="cv">${fmt(state.malla.largo,1)} × ${fmt(state.malla.ancho,1)} m</div></div>
      <div class="calc-row"><div class="ck">R<sub>g</sub></div><div class="cv">${fmt(rMalla.Rg,3)} Ω</div></div>
      <div class="calc-row final"><div class="ck">GPR</div><div class="cv">${fmt(rMalla.gpr,0)} V</div></div>
    </div>

    <div class="section-title">5. Tensiones de paso/contacto <span class="norm-tag">IEEE 80-2013 Cl.16</span></div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">E<sub>m</sub> / admisible</div><div class="cv">${fmt(rTension.Em,1)} V / ${fmt(rTension.Etouch,1)} V</div></div>
      <div class="calc-row final"><div class="ck">Cumplimiento</div>
        <div class="cv" style="color:${rTension.touchOk&&rTension.stepOk?'var(--safe)':'var(--danger)'}; font-weight:600;">
          ${rTension.touchOk&&rTension.stepOk?'✓ CUMPLE':'✗ NO CUMPLE'}
        </div>
      </div>
    </div>

    <div class="section-title">6. Dimensionamiento de conductor <span class="norm-tag">IEEE 80-2013 Cl.11</span></div>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">Sección mínima</div><div class="cv">${fmt(rCond.areaMm2,2)} mm²</div></div>
      <div class="calc-row final"><div class="ck">Calibre ${rCond.esSeleccionManual?'seleccionado (manual)':'sugerido (automático)'}</div><div class="cv">${rCond.seleccionado.calibre}</div></div>
    </div>

    <div class="section-title">7. Materiales y costos estimados</div>
    <div class="calc-block">
      ${costos.items.map(item => `
        <div class="calc-row"><div class="ck" style="font-size:11px;">${item.desc}</div><div class="cv">${fmtCLP(item.total)}</div></div>
      `).join('')}
      <div class="calc-row"><div class="ck">Subtotal (sin IVA)</div><div class="cv">${fmtCLP(costos.subtotal)}</div></div>
      <div class="calc-row final"><div class="ck">TOTAL (con IVA 19%)</div><div class="cv">${fmtCLP(costos.total)}</div></div>
    </div>

    <div class="footer-note">
      Esta memoria resume los cálculos del prototipo GroundDesing Pro, con todos los ajustes acumulados que el usuario haya realizado en los distintos módulos. No constituye una memoria de cálculo firmada ni reemplaza la revisión de un ingeniero responsable del proyecto.
    </div>
  `;
}

function attachHandlers() {
  document.querySelectorAll('.tab[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.tab; render(); });
  });

  document.querySelectorAll('[data-tab-link]').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.tabLink; render(); });
  });

  // --- Panel "Ver fundamento técnico" (toggle expandir/colapsar) ---
  document.querySelectorAll('[data-fundamento-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.fundamentoToggle;
      const panel = document.getElementById(`fundamento-${key}`);
      const chevron = document.getElementById(`chevron-${key}`);
      if (!panel) return;
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'block';
      if (chevron) chevron.classList.toggle('open', !isOpen);
    });
  });

  const userSelect = document.getElementById('user-select');
  if (userSelect) userSelect.addEventListener('change', (e) => {
    state.currentUserId = e.target.value;
    render();
  });

  document.querySelectorAll('[data-soil]').forEach(el => {
    el.addEventListener('click', () => { state.soilModel = el.dataset.soil; render(); });
  });

  document.querySelectorAll('[data-rho-origen]').forEach(el => {
    el.addEventListener('click', () => {
      const origen = el.dataset.rhoOrigen;
      state.malla.rhoOrigen = origen;
      if (origen === 'medido') {
        const wReadings = state.wennerReadings.filter(r => r.a > 0 && r.r > 0);
        if (wReadings.length) {
          state.malla.rho = wReadings.reduce((s,r) => s + wennerApparent(r.a, r.r), 0) / wReadings.length;
        }
      }
      render();
    });
  });

  document.querySelectorAll('#readings-body input').forEach(el => {
    el.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      const val = parseFloat(e.target.value);
      state.wennerReadings[idx][field] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  document.querySelectorAll('.row-del').forEach(el => {
    el.addEventListener('click', (e) => {
      const idx = parseInt(e.target.dataset.del);
      state.wennerReadings.splice(idx, 1);
      render();
    });
  });

  const addBtn = document.getElementById('add-reading');
  if (addBtn) addBtn.addEventListener('click', () => {
    state.wennerReadings.push({ a: '', r: '' });
    render();
  });

  const mallaFieldMap = {
    'm-largo':'largo','m-ancho':'ancho','m-profundidad':'profundidad',
    'm-condL':'nConductoresL','m-condW':'nConductoresW',
    'm-nvarillas':'nVarillas','m-lvarilla':'longVarilla',
    'm-rho':'rho','m-ifalla':'iFalla','m-tfalla':'tFalla'
  };
  Object.entries(mallaFieldMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.malla[key] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  document.querySelectorAll('[data-peso]').forEach(el => {
    el.addEventListener('click', () => { state.tensiones.pesoPersona = parseInt(el.dataset.peso); render(); });
  });

  const tensionesFieldMap = { 'tn-rhos':'rhoSuperficial', 'tn-hs':'hSuperficial', 'tn-t':'tFalla' };
  Object.entries(tensionesFieldMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.tensiones[key] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  const conductorFieldMap = { 'cd-ifalla':'iFalla', 'cd-tfalla':'tFalla', 'cd-tamb':'tempAmbiente', 'cd-tmax':'tempMaxFusion' };
  Object.entries(conductorFieldMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.conductor[key] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  const calibreSelectEl = document.getElementById('cd-calibre-select');
  if (calibreSelectEl) calibreSelectEl.addEventListener('change', (e) => {
    state.conductor.calibreSeleccionado = e.target.value || null;
    render();
  });

  // --- Schlumberger (tabla de lecturas) ---
  document.querySelectorAll('#schl-readings-body input').forEach(el => {
    el.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      const val = parseFloat(e.target.value);
      state.schlumbergerReadings[idx][field] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });
  document.querySelectorAll('[data-del-schl]').forEach(el => {
    el.addEventListener('click', (e) => {
      const idx = parseInt(e.target.dataset.delSchl);
      state.schlumbergerReadings.splice(idx, 1);
      render();
    });
  });
  const addSchlBtn = document.getElementById('add-schl-reading');
  if (addSchlBtn) addSchlBtn.addEventListener('click', () => {
    state.schlumbergerReadings.push({ L: '', l: 0.5, r: '' });
    render();
  });

  // --- Curvas patrón Orellana-Mooney ---
  document.querySelectorAll('[data-cp-modo]').forEach(el => {
    el.addEventListener('click', () => { state.curvaPatron.modoAjuste = el.dataset.cpModo; render(); });
  });

  // --- N capas y parámetros de estratos ---
  document.querySelectorAll('[data-ncapas]').forEach(el => {
    el.addEventListener('click', () => { state.curvaPatron.nCapas = parseInt(el.dataset.ncapas); render(); });
  });
  const N = state.curvaPatron.nCapas;
  for (let i = 0; i < 4; i++) {
    const rhoEl = document.getElementById(`cp-rho-${i}`);
    if (rhoEl) rhoEl.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.curvaPatron.rhos[i] = isNaN(val) ? 100 : val;
      renderResultsOnly();
    });
    const hEl = document.getElementById(`cp-h-${i}`);
    if (hEl) hEl.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.curvaPatron.hs[i] = isNaN(val) ? 1 : val;
      renderResultsOnly();
    });
  }

  // --- Materiales y Costos ---
  const matFieldMap = {
    'mat-pconductor':'precioConductorM', 'mat-pvarilla':'precioVarilla',
    'mat-pconector':'precioConector', 'mat-pexcavacion':'precioExcavacionM',
    'mat-pgel':'precioGelL'
  };
  Object.entries(matFieldMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.materiales[key] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  // --- Aditivo gel químico ---
  document.querySelectorAll('[data-gel-activo]').forEach(el => {
    el.addEventListener('click', () => { state.gel.activo = el.dataset.gelActivo === '1'; render(); });
  });
  const gelFieldMap = { 'gel-rho':'rhoGel', 'gel-rvarilla':'radioVarilla', 'gel-rgel':'radioConGel', 'gel-l':'longVarillaGel' };
  Object.entries(gelFieldMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      state.gel[key] = isNaN(val) ? 0 : val;
      renderResultsOnly();
    });
  });

  // --- Planes (maqueta, sin pasarela de pago real) ---
  document.querySelectorAll('[data-select-plan]').forEach(el => {
    el.addEventListener('click', () => {
      el.textContent = '✓ Solicitud registrada (demo)';
      el.disabled = true;
    });
  });

  // --- Memoria técnica: descarga real de PDF con los datos actuales ---
  const downloadBtn = document.getElementById('download-memoria-btn');
  if (downloadBtn) downloadBtn.addEventListener('click', () => {
    alert('En este prototipo, la descarga de PDF se genera de forma asistida fuera del navegador (Claude la produce con los valores actuales como un archivo .pdf real). Pide a Claude: "genera el PDF de la memoria técnica con estos valores" y se entregará como descarga.');
  });

  // --- Auth (maqueta) ---
  const authSubmit = document.getElementById('auth-submit-btn');
  if (authSubmit) authSubmit.addEventListener('click', () => {
    state.currentUserId = 'u1';
    state.tab = 'dashboard';
    render();
  });
  const authGoogle = document.getElementById('auth-google-btn');
  if (authGoogle) authGoogle.addEventListener('click', () => {
    state.currentUserId = 'u1';
    state.tab = 'dashboard';
    render();
  });
  const authSwitch = document.getElementById('auth-switch-link');
  if (authSwitch) authSwitch.addEventListener('click', () => {
    state.authView = authSwitch.dataset.view;
    state.tab = authSwitch.dataset.view;
    render();
  });

  // --- Equipo (maqueta, pero con efecto real en el estado local) ---
  document.querySelectorAll('[data-role-user]').forEach(el => {
    el.addEventListener('change', (e) => {
      const uid = el.dataset.roleUser;
      const target = USERS.find(u => u.id === uid);
      if (target) target.rol = e.target.value;
      render();
    });
  });
  document.querySelectorAll('[data-remove-user]').forEach(el => {
    el.addEventListener('click', () => {
      el.closest('tr').style.opacity = '0.35';
      el.textContent = 'Quitado (demo)';
      el.disabled = true;
    });
  });
}

// Re-render solo del panel de resultados/inputs para no perder foco al escribir
function renderResultsOnly() {
  const resultsPane = document.querySelector('.results');
  if (resultsPane && !FULLWIDTH_TABS.includes(state.tab)) {
    resultsPane.innerHTML = renderResultsForTab();
  }
}

render();
</script>
