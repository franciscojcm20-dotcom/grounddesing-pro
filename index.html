<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroundDesing Pro — Motor de Cálculo de Puesta a Tierra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1E1E24;
    --panel: #262630;
    --panel-2: #2D2D3A;
    --line: #3a3a48;
    --line-soft: #303040;
    --text: #F2F4F7;
    --text-dim: #aab0bc;
    --text-faint: #767c8a;
    --copper: #E07A23;
    --copper-soft: #E07A2333;
    --copper-dark: #B8611A;
    --safe: #2E7D32;
    --safe-soft: #2E7D3222;
    --danger: #C62828;
    --danger-soft: #C6282822;
    --warn: #C77700;
    --warn-soft: #C7770022;
    --info: #1976D2;
    --info-soft: #1976D222;
    --mono: 'IBM Plex Mono', monospace;
    --cond: 'Montserrat', sans-serif;
    --sans: 'Montserrat', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{font-size:14px;line-height:1.5;}
  ::selection{background:var(--copper-soft);}
  :focus-visible{outline:2px solid var(--copper); outline-offset:2px;}

  .app{display:flex; flex-direction:column; min-height:100vh;}

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #1c2128, #181c22);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{width:30px;height:30px; flex-shrink:0;}
  .brand-text{display:flex; flex-direction:column; line-height:1.1;}
  .brand-name{font-family:var(--cond); font-weight:700; font-size:18px; letter-spacing:0.02em; color:var(--text);}
  .brand-sub{font-family:var(--mono); font-size:10px; color:var(--text-faint); letter-spacing:0.08em; text-transform:uppercase;}
  .topbar-right{display:flex; align-items:center; gap:18px;}
  .norm-pill{
    font-family:var(--mono); font-size:11px; color:var(--text-dim);
    border:1px solid var(--line); border-radius:3px; padding:4px 9px;
    letter-spacing:0.03em;
  }
  .norm-pill b{color:var(--copper); font-weight:600;}

  /* ---------- TABS (módulos) ---------- */
  .tabs{
    display:flex; gap:2px; padding:0 28px; border-bottom:1px solid var(--line);
    background:var(--bg); overflow-x:auto;
  }
  .tab{
    font-family:var(--cond); font-weight:600; font-size:13px;
    color:var(--text-faint); padding:13px 16px 11px; cursor:pointer;
    border-bottom:2px solid transparent; white-space:nowrap;
    letter-spacing:0.02em; user-select:none;
  }
  .tab:hover{color:var(--text-dim);}
  .tab.active{color:var(--copper); border-bottom-color:var(--copper);}
  .tab .tag{
    font-family:var(--mono); font-size:9px; margin-left:6px; padding:1px 5px;
    border-radius:2px; background:var(--line-soft); color:var(--text-faint);
    letter-spacing:0.04em;
  }
  .tab .tag.locked{background:#3a3024; color:#a3884f;}

  /* ---------- MAIN LAYOUT ---------- */
  .main{flex:1; display:grid; grid-template-columns: 380px 1fr; min-height:0;}
  @media (max-width: 980px){ .main{grid-template-columns: 1fr;} }

  /* ---------- INPUT PANEL ---------- */
  .inputs{
    border-right:1px solid var(--line); padding:22px 22px 40px;
    overflow-y:auto; background:var(--panel);
  }
  .panel-title{
    font-family:var(--cond); font-weight:700; font-size:15px; color:var(--text);
    margin:0 0 3px;
  }
  .panel-desc{font-size:12px; color:var(--text-faint); margin:0 0 22px; line-height:1.5;}

  .field-group{margin-bottom:22px;}
  .field-group-label{
    font-family:var(--mono); font-size:10.5px; color:var(--copper);
    letter-spacing:0.09em; text-transform:uppercase; margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .field-group-label::after{content:""; flex:1; height:1px; background:var(--line-soft);}

  .field{margin-bottom:14px;}
  .field label{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:12.5px; color:var(--text-dim); margin-bottom:5px;
  }
  .field label .unit{font-family:var(--mono); font-size:10.5px; color:var(--text-faint);}
  .field input[type=number], .field select{
    width:100%; background:var(--bg); border:1px solid var(--line);
    color:var(--text); font-family:var(--mono); font-size:13.5px;
    padding:9px 10px; border-radius:4px; transition:border-color .15s;
  }
  .field input[type=number]:focus, .field select:focus{border-color:var(--copper);}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .seg{display:flex; border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .seg button{
    flex:1; background:var(--bg); border:none; color:var(--text-dim);
    font-family:var(--sans); font-size:12px; font-weight:500; padding:8px 6px;
    cursor:pointer; border-right:1px solid var(--line);
  }
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--copper-soft); color:var(--copper); font-weight:600;}

  .readings-table{width:100%; border-collapse:collapse; margin-top:4px;}
  .readings-table th{
    font-family:var(--mono); font-size:9.5px; color:var(--text-faint);
    text-align:left; padding:4px 6px; letter-spacing:0.04em; text-transform:uppercase;
    border-bottom:1px solid var(--line-soft);
  }
  .readings-table td{padding:3px 4px;}
  .readings-table input{
    width:100%; background:var(--bg); border:1px solid var(--line-soft);
    color:var(--text); font-family:var(--mono); font-size:12px;
    padding:5px 6px; border-radius:3px;
  }
  .readings-table input:focus{border-color:var(--copper);}
  .row-del{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:14px; padding:2px 6px;}
  .row-del:hover{color:var(--danger);}
  .add-row-btn{
    margin-top:8px; background:none; border:1px dashed var(--line); color:var(--text-dim);
    font-family:var(--sans); font-size:11.5px; padding:6px 10px; border-radius:4px;
    cursor:pointer; width:100%;
  }
  .add-row-btn:hover{border-color:var(--copper); color:var(--copper);}

  .hint{font-size:11px; color:var(--text-faint); line-height:1.5; margin-top:6px;}
  .hint b{color:var(--text-dim);}

  /* ---------- RESULTS PANEL ---------- */
  .results{padding:26px 32px 60px; overflow-y:auto;}

  .diagram-card{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:18px 22px; margin-bottom:22px;
  }
  .diagram-card svg{width:100%; height:auto; display:block;}

  .result-hero{
    display:flex; flex-wrap:wrap; gap:14px; margin-bottom:24px;
  }
  .stat-card{
    flex:1; min-width:190px; background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:16px 18px; position:relative; overflow:hidden;
  }
  .stat-card.primary{border-color:var(--copper); background:linear-gradient(160deg, #221c16, var(--panel) 60%);}
  .stat-card .stat-label{
    font-family:var(--mono); font-size:10px; color:var(--text-faint);
    letter-spacing:0.07em; text-transform:uppercase; margin-bottom:8px;
  }
  .stat-card .stat-value{
    font-family:var(--mono); font-weight:600; font-size:26px; color:var(--text);
    line-height:1;
  }
  .stat-card.primary .stat-value{color:var(--copper);}
  .stat-card .stat-unit{font-size:13px; color:var(--text-faint); margin-left:4px; font-weight:400;}
  .stat-card .stat-note{font-size:11px; color:var(--text-faint); margin-top:7px; line-height:1.4;}

  .verdict-banner{
    display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:6px;
    margin-bottom:24px; font-size:13px;
  }
  .verdict-banner.ok{background:var(--safe-soft); border:1px solid #2E7D3255; color:#8fc991;}
  .verdict-banner.warn{background:var(--danger-soft); border:1px solid #C6282855; color:#e6a7a4;}
  .verdict-banner .v-icon{font-family:var(--mono); font-weight:700; font-size:14px;}

  .section-title{
    font-family:var(--cond); font-weight:700; font-size:14px; color:var(--text);
    margin:0 0 4px; display:flex; align-items:center; gap:10px;
  }
  .section-title .norm-tag{
    font-family:var(--mono); font-size:10px; color:var(--copper); font-weight:500;
    border:1px solid var(--copper-soft); padding:2px 7px; border-radius:3px; letter-spacing:0.03em;
  }
  .section-sub{font-size:11.5px; color:var(--text-faint); margin:0 0 14px;}

  .calc-block{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:18px 20px; margin-bottom:18px;
  }
  .calc-row{
    display:grid; grid-template-columns: 130px 1fr; gap:14px; padding:9px 0;
    border-bottom:1px solid var(--line-soft); align-items:baseline;
  }
  .calc-row:last-child{border-bottom:none;}
  .calc-row .ck{font-size:12px; color:var(--text-dim);}
  .calc-row .cv{font-family:var(--mono); font-size:13px; color:var(--text);}
  .calc-row .cv .ghost{color:var(--text-faint);}
  .calc-row.final .cv{color:var(--copper); font-weight:600; font-size:15px;}

  .eq{
    font-family:var(--mono); font-size:14px; color:var(--text); background:var(--bg);
    border:1px solid var(--line-soft); border-radius:4px; padding:10px 14px; margin:10px 0;
    overflow-x:auto; white-space:nowrap;
  }
  .eq .op{color:var(--text-faint);}
  .eq .val{color:var(--copper);}

  table.data-table{width:100%; border-collapse:collapse; margin:8px 0;}
  table.data-table th{
    text-align:left; font-family:var(--mono); font-size:10px; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:0.05em; padding:6px 10px;
    border-bottom:1px solid var(--line);
  }
  table.data-table td{
    font-family:var(--mono); font-size:12.5px; color:var(--text-dim);
    padding:7px 10px; border-bottom:1px solid var(--line-soft);
  }
  table.data-table td.hl{color:var(--copper); font-weight:600;}

  .ref-list{font-size:11.5px; color:var(--text-faint); line-height:1.7; margin:0; padding-left:0; list-style:none;}
  .ref-list li{padding-left:18px; position:relative; margin-bottom:4px;}
  .ref-list li::before{content:"§"; position:absolute; left:0; color:var(--copper); font-family:var(--mono);}

  .footer-note{
    margin-top:32px; padding-top:18px; border-top:1px solid var(--line);
    font-size:11px; color:var(--text-faint); line-height:1.6;
  }

  /* ---------- PANEL "VER FUNDAMENTO TÉCNICO" ---------- */
  .fundamento-wrap{ margin:14px 0 22px; }
  .fundamento-btn{
    display:flex; align-items:center; gap:7px; background:var(--panel-2);
    border:1px solid var(--copper-soft); color:var(--copper); font-family:var(--sans);
    font-weight:600; font-size:12.5px; padding:9px 14px; border-radius:6px; cursor:pointer;
    width:100%; text-align:left;
  }
  .fundamento-btn:hover{ background:var(--copper-soft); }
  .fundamento-icon{ font-family:var(--mono); font-size:13px; }
  .fundamento-chevron{ margin-left:auto; font-size:10px; transition:transform .15s; }
  .fundamento-chevron.open{ transform:rotate(180deg); }
  .fundamento-panel{
    background:var(--panel); border:1px solid var(--line); border-top:none;
    border-radius:0 0 6px 6px; padding:18px 20px; margin-top:-1px;
  }
  .fundamento-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
  .fundamento-title{ font-family:var(--cond); font-weight:700; font-size:14px; color:var(--text); }
  .fundamento-eq{
    font-family:var(--mono); font-size:13px; color:var(--copper); background:var(--bg);
    border:1px solid var(--line-soft); border-radius:4px; padding:10px 14px; margin-bottom:14px;
    overflow-x:auto; white-space:nowrap;
  }
  .fundamento-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  @media (max-width:760px){ .fundamento-grid{ grid-template-columns:1fr; } }
  .fundamento-item{ background:var(--panel-2); border-radius:5px; padding:10px 12px; }
  .fi-label{ font-family:var(--mono); font-size:9.5px; color:var(--copper); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .fi-text{ font-size:11.5px; color:var(--text-dim); line-height:1.5; }
  .fundamento-biblio{ font-size:10.5px; color:var(--text-faint); line-height:1.5; border-top:1px solid var(--line-soft); padding-top:10px; }

  .locked-pane{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; min-height:340px; text-align:center; padding:40px;
  }
  .locked-pane .lock-icon{font-size:28px; margin-bottom:14px; opacity:0.5;}
  .locked-pane h3{font-family:var(--cond); color:var(--text); font-size:16px; margin:0 0 8px;}
  .locked-pane p{font-size:12.5px; color:var(--text-faint); max-width:360px; margin:0;}

  /* ---------- MOCKUP BANNER ---------- */
  .mockup-banner{
    display:flex; align-items:flex-start; gap:12px; padding:14px 18px; border-radius:6px;
    margin-bottom:24px; background:#3a302122; border:1px solid #a3884f55;
  }
  .mockup-banner .mb-icon{font-family:var(--mono); font-size:13px; color:#c9a35e; font-weight:700; flex-shrink:0; margin-top:1px;}
  .mockup-banner .mb-text{font-size:12px; color:#c9a35e; line-height:1.55;}
  .mockup-banner .mb-text b{color:#e0bf80;}

  /* ---------- DASHBOARD ---------- */
  .dash-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
  @media (max-width:900px){ .dash-grid{grid-template-columns:repeat(2,1fr);} }
  .dash-kpi{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:16px 18px;}
  .dash-kpi .k-label{font-family:var(--mono); font-size:10px; color:var(--text-faint); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px;}
  .dash-kpi .k-value{font-family:var(--mono); font-weight:600; font-size:24px; color:var(--text);}
  .dash-kpi .k-delta{font-size:11px; margin-top:6px;}
  .dash-kpi .k-delta.up{color:var(--safe);}
  .dash-kpi .k-delta.flat{color:var(--text-faint);}

  .project-table{width:100%; border-collapse:collapse;}
  .project-table th{
    text-align:left; font-family:var(--mono); font-size:10px; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:.05em; padding:9px 12px; border-bottom:1px solid var(--line);
  }
  .project-table td{padding:11px 12px; font-size:12.5px; color:var(--text-dim); border-bottom:1px solid var(--line-soft);}
  .project-table tr:hover td{background:#252b3450;}
  .status-chip{font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:10px; letter-spacing:.03em;}
  .status-chip.active{background:var(--safe-soft); color:#8fc991;}
  .status-chip.review{background:#E07A2322; color:#f0b87a;}
  .status-chip.draft{background:var(--line-soft); color:var(--text-faint);}
  .proj-name{color:var(--text); font-weight:500;}

  .new-project-btn, .primary-btn{
    background:var(--copper); border:none; color:#1a1208; font-family:var(--sans);
    font-weight:600; font-size:12.5px; padding:9px 16px; border-radius:5px; cursor:pointer;
  }
  .new-project-btn:hover, .primary-btn:hover{background:#e68d52;}
  .secondary-btn{
    background:none; border:1px solid var(--line); color:var(--text-dim); font-family:var(--sans);
    font-weight:500; font-size:12.5px; padding:8px 15px; border-radius:5px; cursor:pointer;
  }
  .secondary-btn:hover{border-color:var(--text-faint); color:var(--text);}
  .danger-link-btn{
    background:none; border:none; color:var(--danger); font-family:var(--sans);
    font-weight:500; font-size:12px; cursor:pointer; padding:0; text-decoration:underline;
  }

  /* ---------- USER SWITCHER (topbar) ---------- */
  .user-switcher{display:flex; align-items:center; gap:10px; position:relative;}
  .user-select{
    background:var(--bg); border:1px solid var(--line); color:var(--text-dim);
    font-family:var(--sans); font-size:11.5px; padding:6px 9px; border-radius:5px;
    cursor:pointer; max-width:190px;
  }
  .user-select:focus{border-color:var(--copper);}
  .user-avatar{
    width:30px; height:30px; border-radius:50%; background:var(--copper-soft);
    color:var(--copper); display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:11.5px; cursor:pointer;
    border:1px solid var(--copper-soft); flex-shrink:0;
  }
  .user-avatar:hover{background:var(--copper); color:#1a1208;}

  /* ---------- AUTH SCREENS (login/registro) ---------- */
  .auth-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:40px 20px; background:radial-gradient(circle at 50% 0%, #1d222a, var(--bg) 60%);
  }
  .auth-card{
    width:100%; max-width:380px; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:34px 32px;
  }
  .auth-brand{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:26px;}
  .auth-title{font-family:var(--cond); font-weight:700; font-size:20px; text-align:center; margin:0 0 6px;}
  .auth-sub{font-size:12.5px; color:var(--text-faint); text-align:center; margin:0 0 26px;}
  .auth-field{margin-bottom:16px;}
  .auth-field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
  .auth-field input{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text);
    font-family:var(--sans); font-size:13px; padding:10px 12px; border-radius:5px;
  }
  .auth-field input:focus{border-color:var(--copper);}
  .auth-submit{
    width:100%; background:var(--copper); border:none; color:#1a1208; font-weight:600;
    font-size:13.5px; padding:11px; border-radius:6px; cursor:pointer; margin-top:6px;
  }
  .auth-submit:hover{background:#e68d52;}
  .auth-switch{text-align:center; font-size:12px; color:var(--text-faint); margin-top:20px;}
  .auth-switch a{color:var(--copper); cursor:pointer; text-decoration:none;}
  .auth-switch a:hover{text-decoration:underline;}
  .auth-divider{display:flex; align-items:center; gap:10px; margin:20px 0; font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em;}
  .auth-divider::before, .auth-divider::after{content:""; flex:1; height:1px; background:var(--line);}

  /* ---------- PERFIL / EQUIPO ---------- */
  .profile-header{display:flex; align-items:center; gap:18px; margin-bottom:26px;}
  .profile-avatar-lg{
    width:60px; height:60px; border-radius:50%; background:var(--copper-soft); color:var(--copper);
    display:flex; align-items:center; justify-content:center; font-family:var(--mono);
    font-weight:700; font-size:20px; flex-shrink:0;
  }
  .profile-name{font-family:var(--cond); font-weight:700; font-size:19px; color:var(--text); margin:0 0 3px;}
  .profile-meta{font-size:12px; color:var(--text-faint);}
  .role-badge{
    font-family:var(--mono); font-size:10px; padding:3px 10px; border-radius:10px;
    letter-spacing:.03em; display:inline-block; margin-top:6px;
  }
  .role-badge.admin{background:var(--copper-soft); color:var(--copper);}
  .role-badge.ingeniero{background:var(--safe-soft); color:#8fc991;}
  .role-badge.revisor{background:#4a6fa522; color:#8db3e0;}
  .role-badge.invitado{background:var(--line-soft); color:var(--text-faint);}

  .perm-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .perm-item{
    display:flex; align-items:center; gap:9px; padding:10px 14px; background:var(--bg);
    border:1px solid var(--line-soft); border-radius:5px; font-size:12.5px; color:var(--text-dim);
  }
  .perm-item .pi-icon{font-family:var(--mono); font-weight:700; font-size:13px; flex-shrink:0;}
  .perm-item.granted .pi-icon{color:var(--safe);}
  .perm-item.denied .pi-icon{color:var(--text-faint);}
  .perm-item.denied{color:var(--text-faint);}

  .team-table{width:100%; border-collapse:collapse;}
  .team-table th{
    text-align:left; font-family:var(--mono); font-size:10px; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:.05em; padding:9px 12px; border-bottom:1px solid var(--line);
  }
  .team-table td{padding:11px 12px; font-size:12.5px; color:var(--text-dim); border-bottom:1px solid var(--line-soft); vertical-align:middle;}
  .team-user-cell{display:flex; align-items:center; gap:10px;}
  .team-avatar{

  { codigo: "IEEE Std 80-2013", pais: "Internacional (ANSI/IEEE)", desc: "Guide for Safety in AC Substation Grounding", implementado: true },
  { codigo: "IEEE Std 81-2012", pais: "Internacional (ANSI/IEEE)", desc: "Guide for Measuring Earth Resistivity, Ground Impedance", implementado: true },

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — WENNER (IEEE Std 81-2012, Cl. 8)
// ---------------------------------------------------------------------
// ρa = 2 * π * a * R   (suelo homogéneo, electrodos equiespaciados, profundidad << a)
function wennerApparent(a, R) {
  return 2 * Math.PI * a * R;
}

// Estimación de 2 capas a partir de la curva ρa(a):
// Usamos el método de asíntotas: ρ1 = promedio de las lecturas con 'a' pequeño,
// ρ2 = promedio de las lecturas con 'a' grande, y h se estima por el punto de
// inflexión (a donde ρa cruza el promedio geométrico de ρ1 y ρ2).
// Esto es una aproximación de ingeniería estándar para interpretación rápida
// de curvas de Wenner (no sustituye software de inversión geofísica completo).
function estimateTwoLayer(readings) {
  const sorted = [...readings].sort((x,y)=>x.a-y.a);
  const rhos = sorted.map(r => ({a: r.a, rho: wennerApparent(r.a, r.r)}));
  const n = rhos.length;
  const halfLow = rhos.slice(0, Math.ceil(n/2));
  const halfHigh = rhos.slice(Math.floor(n/2));
  const rho1 = halfLow.reduce((s,x)=>s+x.rho,0) / halfLow.length;
  const rho2 = halfHigh.reduce((s,x)=>s+x.rho,0) / halfHigh.length;
  const target = Math.sqrt(rho1 * rho2);
  let hEstimate = sorted[Math.floor(n/2)].a;
  let minDiff = Infinity;
  for (const pt of rhos) {
    const diff = Math.abs(pt.rho - target);
    if (diff < minDiff) { minDiff = diff; hEstimate = pt.a; }
  }
  return { rho1, rho2, h: hEstimate, curve: rhos };
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — SCHLUMBERGER (IEEE Std 81-2012, Cl. 8 / método de 4 electrodos
// con espaciamiento desigual: electrodos de potencial MN fijos y cercanos al centro,
// electrodos de corriente AB que se separan progresivamente)
// ---------------------------------------------------------------------
// ρa = π · L² / ℓ · R   donde L = AB/2 (semi-distancia de corriente), ℓ = MN/2 (semi-distancia de potencial)
// (forma equivalente: ρa = π·(L²-ℓ²)/(2ℓ) · R cuando se usa la expresión exacta; la forma
// aproximada π·L²/ℓ·R es válida cuando L >> ℓ, condición típica de un sondeo Schlumberger bien ejecutado)
function schlumbergerApparent(L, l, R) {
  // Forma exacta (Telford et al.): ρa = π · (L² - l²) / (2l) · R
  return Math.PI * ((L*L - l*l) / (2*l)) * R;
}

function compareWennerSchlumberger(wReadings, sReadings) {
  const w = wReadings.filter(r=>r.a>0 && r.r>0).map(r => ({ a: r.a, rho: wennerApparent(r.a, r.r) }));
  const s = sReadings.filter(r=>r.L>0 && r.l>0 && r.r>0).map(r => ({ L: r.L, rho: schlumbergerApparent(r.L, r.l, r.r) }));
  const avgW = w.length ? w.reduce((acc,x)=>acc+x.rho,0)/w.length : 0;
  const avgS = s.length ? s.reduce((acc,x)=>acc+x.rho,0)/s.length : 0;
  const diffPct = avgW ? ((avgS - avgW) / avgW) * 100 : 0;
  return { w, s, avgW, avgS, diffPct };
}

// ---------------------------------------------------------------------
// CURVAS PATRÓN DE ORELLANA-MOONEY (SEV de 2 capas, curvas tipo H/K)
// ---------------------------------------------------------------------
// Las curvas de Orellana-Mooney (1966) son curvas patrón normalizadas para
// interpretar sondeos eléctricos verticales (SEV) Schlumberger en suelos de 2 capas.
// Se grafican como ρa/ρ1 (eje Y, log) vs AB/2/h1 (eje X, log), parametrizadas por k = ρ2/ρ1.
// Aquí usamos la función de resistividad aparente teórica de 2 capas (Stefanescu/Wenner
// generalizado) que es la base matemática de esas curvas, evaluada en un rango de
// AB/2 normalizado, para generar la curva teórica y compararla con los datos de campo.
function theoreticalTwoLayerRho(t, k, nTerms=60) {
  // ρa(t)/ρ1 para configuración Schlumberger sobre suelo de 2 capas (Stefanescu):
  // ρa/ρ1 = 1 + 2·Σ[ k_n · t / sqrt(t² + (2n)²) ]  con factor de reflexión k_n = ((k-1)/(k+1))^n
  // t = AB/2 / h1 (espaciamiento normalizado), k = ρ2/ρ1
  const Kr = (k - 1) / (k + 1);
  let sum = 0;
  for (let n = 1; n <= nTerms; n++) {
    const kn = Math.pow(Kr, n);
    sum += kn / Math.sqrt(1 + Math.pow(2*n/t, 2));
  }
  return 1 + 2 * sum;
}

function generateTypeCurve(k, points=40) {
  const tMin = 0.1, tMax = 100;
  const logMin = Math.log10(tMin), logMax = Math.log10(tMax);
  const curve = [];
  for (let i = 0; i <= points; i++) {
    const logT = logMin + (i/points) * (logMax - logMin);
    const t = Math.pow(10, logT);
    curve.push({ t, ratio: theoreticalTwoLayerRho(t, k) });
  }
  return curve;
}

// Ajuste automático: encuentra la razón k=ρ2/ρ1 cuya curva teórica minimiza el
// error contra los datos de campo normalizados (ρa/ρ1_estimado vs a/h_estimado),
// probando un set discreto de razones típicas de las cartillas Orellana-Mooney.
function autoFitCurve(readings, twoLayer) {
  if (!twoLayer || readings.length < 2) return { bestK: 5, error: null };
  const rho1 = twoLayer.rho1, h = twoLayer.h || 1;
  const fieldPts = readings.filter(r=>r.a>0 && r.r>0).map(r => ({
    t: r.a / h,
    ratio: wennerApparent(r.a, r.r) / rho1,
  }));
  const candidateKs = [0.1, 0.2, 0.33, 0.5, 1, 2, 3, 5, 7, 10, 15, 20, 30, 50, 100];
  let bestK = 5, bestErr = Infinity;
  for (const k of candidateKs) {
    let err = 0;
    for (const pt of fieldPts) {
      const theo = theoreticalTwoLayerRho(pt.t, k);
      err += Math.pow(Math.log10(theo) - Math.log10(pt.ratio), 2);
    }
    if (err < bestErr) { bestErr = err; bestK = k; }
  }
  return { bestK, error: bestErr, fieldPts, rho1, h };
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — SUELO DE N CAPAS (algoritmo recursivo de Wait, 1954)
// ---------------------------------------------------------------------
// Generaliza la función de resistividad aparente para suelos de hasta 4 capas.
// Referencia: Wait, J.R. (1954) "Mutual electromagnetic coupling of loops over a
// homogeneous ground" / Telford et al., "Applied Geophysics" 2nd ed., Cl. 8.
// También base matemática de las cartillas Orellana-Mooney para SEV multi-capa.
//
// Para configuración Wenner sobre N capas:
// ρa(a) = ρ1 · [ 1 + 4 · Σ_{n=1}^{∞} T(λ_n, 0) · K0(nλ/a) ... ]
// donde la integración se realiza numéricamente usando la transformada de Hankel
// y el kernel de Wait T(λ) se calcula de forma recursiva desde la capa N hacia arriba.
//
// Implementamos la integración numérica de Abramowitz & Stegun (tabla de cuadratura
// de Gauss-Laguerre adaptada, método estándar en geofísica aplicada):
//
// ρa = ρ1 · [1 + 2·a · ∫₀^∞ K(λ)·J₁(λ·a)·λ · dλ]
// donde K(λ) = [T₁(λ)/ρ₁ - 1] es el kernel de reflectividad de Wait
// y T₁(λ) se calcula recursivamente:
//   T_N(λ) = ρ_N   (capa más profunda, semi-infinita)
//   T_i(λ) = ρ_i · (T_{i+1} + ρ_i·tanh(λ·h_i)) / (ρ_i + T_{i+1}·tanh(λ·h_i))
//
// Abreviamos la integral con cuadratura de Gauss-Laguerre de 20 puntos
// (exacta hasta orden 39 del polinomio; suficiente para 4 capas).

function besselJ1(x) {
  // Serie de Taylor para J1(x), suficiente para |x| < 30 (rango de la integral)
  if (Math.abs(x) < 1e-10) return 0;
  // Polinomial de Abramowitz & Stegun 9.4.1 (aproximación analítica de alta precisión):
  if (Math.abs(x) <= 3) {
    const t = x/3;
    return x*(0.5-0.56249985*t**2+0.21093573*t**4-0.03954289*t**6+0.00443319*t**8-0.00031761*t**10+0.00001109*t**12);
  }
  // Para x > 3: aproximación asintótica
  const t = 3/x;
  const f = 0.79788456-0.00000077*t-0.00552740*t**2-0.00009512*t**3+0.00137237*t**4-0.00072805*t**5+0.00014476*t**6;
  const g = -0.04166397*t-0.00003954*t**2+0.00262573*t**3-0.00054125*t**4-0.00029333*t**5+0.00013558*t**6;
  return Math.sqrt(1/Math.PI/Math.max(x,1e-9)) * (f*Math.cos(x-3*Math.PI/4) - g*Math.sin(x-3*Math.PI/4));
}

// Kernel recursivo de Wait: T_i(λ) para i-ésima capa dada estructura de capas
function waitKernel(lambda, rhos, hs) {
  // rhos = [ρ1, ρ2, ..., ρN], hs = [h1, h2, ..., h_{N-1}] (última capa semi-infinita)
  const N = rhos.length;
  let T = rhos[N-1]; // capa más profunda: T_N = ρ_N
  for (let i = N-2; i >= 0; i--) {
    const ri = rhos[i];
    const hi = hs[i];
    const th = Math.tanh(lambda * hi);
    T = ri * (T + ri * th) / (ri + T * th);
  }
  return T; // T_1(λ)
}

// Puntos y pesos de cuadratura de Gauss-Laguerre de 20 puntos
// para ∫₀^∞ f(x)·e^{-x} dx ≈ Σ w_i·f(x_i)
// (fuente: Abramowitz & Stegun, tabla 25.9)
const GL20_X = [0.0705395897,0.3721267900,0.9165821000,1.7073065850,2.7491923600,
                4.0489932320,5.6151705220,7.4590174560,9.5943070940,12.0388025470,
                14.8142934430,17.9488955400,21.4787882430,25.4517027450,29.9325953890,
                35.0134342700,41.0580432640,48.2667786110,57.5236329720,71.2441773080];
const GL20_W = [0.1687433680,0.2912561302,0.2666229210,0.1660269342,0.0748260647,
                0.0249644174,0.0062087456,0.0011395717,0.0001495793,0.0000143208,
                0.0000009317,0.0000000398,0.0000000011,0.0000000000,0.0000000000,
                0.0000000000,0.0000000000,0.0000000000,0.0000000000,0.0000000000];

function wennerApparentNLayer(a, rhos, hs) {
  // ρa = ρ1 · [1 + 2·a · ∫₀^∞ (T1(λ)/ρ1 - 1) · J1(λ·a) · λ · dλ]
  // Cambio de variable: λ = u/a → dλ = du/a, J1(u) y T(u/a)
  // = ρ1 · [1 + 2 · ∫₀^∞ (T1(u/a)/ρ1 - 1) · J1(u) · u · du]
  // Para cuadratura: la integrand decae exponencialmente, así que usamos
  // la sustitución adicional u = e^t para manejar el rango [0, ∞)
  // con el método de Gauss-Laguerre adaptado al kernel de Wait.
  const rho1 = rhos[0];
  let integral = 0;
  // Usamos un set denso de puntos de integración logarítmicamente espaciados
  // (más robusto que Gauss-Laguerre para este kernel oscilatorio):
  const pts = 150; // suficiente para convergencia hasta 4 capas
  const uMin = 1e-3, uMax = 200;
  const du = (uMax - uMin) / pts;
  for (let i = 0; i < pts; i++) {
    const u1 = uMin + i * du;
    const u2 = u1 + du;
    const um = (u1 + u2) / 2;
    const T1 = waitKernel(um / a, rhos, hs);
    const kern = (T1 / rho1 - 1) * besselJ1(um) * um;
    integral += kern * du;
  }
  return rho1 * (1 + 2 * integral);
}

// Tabla de tipos de suelo según normas internacionales
// (IEC 60364, IEEE 80, CIGRE, catálogos de suelos de ingeniería eléctrica)
const SOIL_TYPES = [
  { nombre: 'Agua marina', rhoMin: 0.1, rhoMax: 1, clase: 'A' },
  { nombre: 'Agua de río / lago', rhoMin: 1, rhoMax: 100, clase: 'A' },
  { nombre: 'Arcilla húmeda / pantano', rhoMin: 2, rhoMax: 30, clase: 'B' },
  { nombre: 'Arcilla plástica / franco-arcilloso', rhoMin: 30, rhoMax: 100, clase: 'B' },
  { nombre: 'Arena arcillosa húmeda', rhoMin: 30, rhoMax: 150, clase: 'B' },
  { nombre: 'Franco-arenoso (húmedo)', rhoMin: 100, rhoMax: 300, clase: 'C' },
  { nombre: 'Arena húmeda', rhoMin: 150, rhoMax: 500, clase: 'C' },
  { nombre: 'Arena seca / grava arcillosa', rhoMin: 300, rhoMax: 1000, clase: 'D' },
  { nombre: 'Grava / cascajo seco', rhoMin: 1000, rhoMax: 5000, clase: 'E' },
  { nombre: 'Roca fracturada / esquisto', rhoMin: 1000, rhoMax: 10000, clase: 'E' },
  { nombre: 'Roca sana / granito', rhoMin: 10000, rhoMax: 100000, clase: 'F' },
  { nombre: 'Permafrost / suelo congelado', rhoMin: 100000, rhoMax: 1000000, clase: 'F' },
];

function classifySoil(rho) {
  return SOIL_TYPES.find(s => rho >= s.rhoMin && rho < s.rhoMax) || SOIL_TYPES[SOIL_TYPES.length-1];
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — MATERIALES Y COSTOS
// ---------------------------------------------------------------------
function computeMateriales(malla, gel, conductor) {
  const area = malla.largo * malla.ancho;
  const condL = (malla.nConductoresL * malla.ancho) + (malla.nConductoresW * malla.largo);
  const nVarillas = malla.nVarillas;
  const longVarilla = malla.longVarilla;

  // Longitud de conductor + 5% de traslapes/pérdidas
  const condLTotal = condL * 1.05;
  // Nº de conectores exotérmicos: en cada intersección + 2 por varilla (aprox)
  const nIntersecciones = malla.nConductoresL * malla.nConductoresW;
  const nConectores = nIntersecciones + nVarillas * 2;
  // Excavación: longitud total de zanja de 0.6m de prof × 0.3m ancho
  const mLZanja = condL;
  // Volumen de gel (si activo): π·(r_gel²-r_var²)·longVarilla por varilla
  const volGelLt = gel.activo
    ? (Math.PI * (Math.pow(gel.radioConGel,2) - Math.pow(gel.radioVarilla,2)) * gel.longVarillaGel * nVarillas * 1000)
    : 0;

  // Calibre real del conductor: el efectivamente seleccionado en el módulo
  // "Dimensionamiento Conductor" (manual si fue elegido y es válido, o el
  // sugerido automáticamente en caso contrario). El sistema es acumulativo:
  // si el usuario cambia el calibre, este valor cambia y se propaga aquí.
  const rCond = computeConductor(conductor);
  const calibreReal = rCond.seleccionado.calibre;
  const calibreMm2 = rCond.seleccionado.mm2;

  return { condLTotal, nVarillas, longVarilla, nConectores, nIntersecciones, mLZanja, volGelLt, area, calibreReal, calibreMm2 };
}

// Precio por metro de conductor escalado según sección real (referencia: 4/0 AWG
// a 107.2mm² cuesta precioConductorM por defecto; se escala linealmente con el área).
function precioConductorEscalado(precioBaseM, mm2Seleccionado, mm2Referencia = 107.2) {
  return precioBaseM * (mm2Seleccionado / mm2Referencia);
}

function computeCostos(mat, precios) {
  const precioConductorEscaladoM = precioConductorEscalado(precios.precioConductorM, mat.calibreMm2);
  const items = [
    { desc: `Conductor Cu desnudo ${mat.calibreReal} (${mat.condLTotal.toFixed(1)} m)`,
      qty: mat.condLTotal, unit: 'm', unitPrice: precioConductorEscaladoM,
      total: mat.condLTotal * precioConductorEscaladoM },
    { desc: `Varilla copperweld 5/8" × ${mat.longVarilla}m (${mat.nVarillas} un.)`,
      qty: mat.nVarillas, unit: 'un', unitPrice: precios.precioVarilla,
      total: mat.nVarillas * precios.precioVarilla },
    { desc: `Conector exotérmico (${mat.nConectores} un.)`,
      qty: mat.nConectores, unit: 'un', unitPrice: precios.precioConector,
      total: mat.nConectores * precios.precioConector },
    { desc: `Excavación zanja (${mat.mLZanja.toFixed(1)} m)`,
      qty: mat.mLZanja, unit: 'm', unitPrice: precios.precioExcavacionM,
      total: mat.mLZanja * precios.precioExcavacionM },
  ];
  if (mat.volGelLt > 0) {
    items.push({ desc: `Gel conductivo (${mat.volGelLt.toFixed(1)} L)`,
      qty: mat.volGelLt, unit: 'L', unitPrice: precios.precioGelL,
      total: mat.volGelLt * precios.precioGelL });
  }
  const subtotal = items.reduce((s,i) => s+i.total, 0);
  const iva = subtotal * 0.19; // IVA Chile
  const total = subtotal + iva;
  return { items, subtotal, iva, total };
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — ADITIVO GEL QUÍMICO PARA MEJORAMIENTO DE TIERRAS
// ---------------------------------------------------------------------
// Modelo basado en la fórmula de resistencia de electrodo vertical (Dwight/Sunde)
// aplicada en dos configuraciones: (1) electrodo desnudo en suelo nativo,
// (2) electrodo envuelto en una "funda" cilíndrica de gel conductivo de baja
// resistividad y mayor radio efectivo, que actúa como capa de transición de
// baja resistencia entre el conductor metálico y el suelo nativo.
// R_varilla = (ρ / (2π·L)) · [ ln(8L/d) - 1 ]   (Dwight, para varilla vertical, d=diámetro)
function rodResistanceDwight(rho, L, radius) {
  const d = 2 * radius;
  return (rho / (2 * Math.PI * L)) * (Math.log(8 * L / d) - 1);
}

// Con gel: se modela como dos resistencias en serie equivalentes — la "funda" de gel
// (radio interior = radio varilla, radio exterior = radio con gel, resistividad ρ_gel)
// más el suelo nativo visto desde el radio exterior de la funda hacia afuera.
// Aproximación de cilindros concéntricos (análoga a resistencia de aislamiento radial):
// R_funda = ρ_gel / (2π·L) · ln(r_gel / r_varilla)
// R_suelo_desde_r_gel = (ρ_suelo / (2π·L)) · [ ln(8L/(2·r_gel)) - 1 ]  (Dwight evaluado desde el radio mayor)
function rodResistanceWithGel({ rhoSuelo, rhoGel, L, radioVarilla, radioGel }) {
  const Rfunda = (rhoGel / (2 * Math.PI * L)) * Math.log(radioGel / radioVarilla);
  const Rsuelo = (rhoSuelo / (2 * Math.PI * L)) * (Math.log(8 * L / (2 * radioGel)) - 1);
  const Rtotal = Rfunda + Rsuelo;
  // Resistividad efectiva equivalente: la que, sin gel, daría la misma R con la fórmula de Dwight estándar
  const rhoEff = Rtotal / ((1 / (2 * Math.PI * L)) * (Math.log(8 * L / (2 * radioVarilla)) - 1));
  return { Rfunda, Rsuelo, Rtotal, rhoEff };
}

function computeGel(g, rhoSuelo) {
  const Rsin = rodResistanceDwight(rhoSuelo, g.longVarillaGel, g.radioVarilla);
  const conGel = rodResistanceWithGel({
    rhoSuelo, rhoGel: g.rhoGel, L: g.longVarillaGel,
    radioVarilla: g.radioVarilla, radioGel: g.radioConGel,
  });
  const mejoraPct = ((Rsin - conGel.Rtotal) / Rsin) * 100;
  return { Rsin, ...conGel, mejoraPct };
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — RESISTENCIA DE MALLA (IEEE Std 80-2013, Cl. 14.2, Ec. de Sverak)
// ---------------------------------------------------------------------
// Rg = ρ [ 1/Lt + 1/sqrt(20A) * (1 + 1/(1 + h*sqrt(20/A))) ]
// ρ: resistividad del suelo (Ω·m) | A: área de la malla (m²)
// Lt: longitud total de conductor enterrado (incl. varillas) (m) | h: profundidad (m)
function sverakGridResistance({ rho, area, Ltotal, depth }) {
  const term1 = 1 / Ltotal;
  const term2 = (1 / Math.sqrt(20 * area)) * (1 + 1 / (1 + depth * Math.sqrt(20 / area)));
  const Rg = rho * (term1 + term2);
  return { Rg, term1, term2 };
}

function computeMalla(m, gelInfo) {
  const area = m.largo * m.ancho;
  const condL = (m.nConductoresL * m.ancho) + (m.nConductoresW * m.largo);
  const condRods = m.nVarillas * m.longVarilla;
  const Ltotal = condL + condRods;
  // Si el aditivo gel está activo, se usa la resistividad efectiva equivalente
  // (rho_eff) calculada a partir del modelo de electrodo con funda de gel,
  // en vez de la resistividad nativa del suelo medida por Wenner.
  const rhoUsado = (gelInfo && gelInfo.activo) ? gelInfo.rhoEff : m.rho;
  const { Rg, term1, term2 } = sverakGridResistance({ rho: rhoUsado, area, Ltotal, depth: m.profundidad });
  const gpr = Rg * m.iFalla;
  return { area, condL, condRods, Ltotal, Rg, term1, term2, gpr, rhoUsado };
}

// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — TENSIONES DE PASO Y CONTACTO (IEEE Std 80-2013, Cl. 16)
// ---------------------------------------------------------------------

// Factor de reducción por capa superficial (Sverak), Cl. 16.5, Ec. 27:
// Cs = 1 - 0.09*(1 - ρ/ρs) / (2*hs + 0.09)
function surfaceFactorCs(rho, rhoSuperficial, hSuperficial) {
  return 1 - (0.09 * (1 - rho / rhoSuperficial)) / (2 * hSuperficial + 0.09);
}

// Tensión de contacto admisible (touch voltage), Cl. 16.4-16.5, Ec. 33 (70kg) / 30 (50kg)
function permissibleTouch(Cs, rhoSuperficial, t, peso) {
  const k = peso === 50 ? 0.116 : 0.157;
  return (1000 + 1.5 * Cs * rhoSuperficial) * k / Math.sqrt(t);
}

// Tensión de paso admisible (step voltage), Cl. 16.4-16.5, Ec. 32 (70kg) / 29 (50kg)
function permissibleStep(Cs, rhoSuperficial, t, peso) {
  const k = peso === 50 ? 0.116 : 0.157;
  return (1000 + 6 * Cs * rhoSuperficial) * k / Math.sqrt(t);
}

// Tensión de malla real (mesh voltage Em) — Cl. 16.5, forma simplificada de Sverak
function meshVoltage({ rho, Ig, D, d, h, n, Ltotal }) {
  const Kii = 1; // electrodos perimetrales presentes (varillas en el borde)
  const Kh = Math.sqrt(1 + h / 1.0);
  const Km = (1 / (2 * Math.PI)) * (
    Math.log(
      (D * D) / (16 * h * d) +
      Math.pow(D + 2 * h, 2) / (8 * D * d) -
      h / (4 * d)
    ) + (Kii / Kh) * Math.log(8 / (Math.PI * (2 * n - 1)))
  );
  const Ki = 0.644 + 0.148 * n; // factor de irregularidad
  const Em = (rho * Ki * Ig * Km) / Ltotal;
  return { Em, Km, Ki, Kh, Kii };
}

// Tensión de paso real (step voltage Es) — Cl. 16.5
function stepVoltageReal({ rho, Ig, D, h, n, Ltotal, Ki }) {
  const Ks = (1 / Math.PI) * (
    1 / (2 * h) + 1 / (D + h) + (1 / D) * (1 - Math.pow(0.5, n - 2))
  );
  const Es = (rho * Ks * Ki * Ig) / Ltotal;
  return { Es, Ks };
}

function computeTensiones(t, malla, conductor) {
  // ρ se toma de malla.rho — única fuente de verdad para la resistividad del
  // suelo en todo el sistema (medida en vivo desde Wenner o editada manualmente
  // en el módulo "Resistencia de Malla"). Esto evita que tensiones.rho quede
  // desincronizado del valor realmente usado en el resto de los cálculos.
  const rho = malla.rho;
  const Cs = surfaceFactorCs(rho, t.rhoSuperficial, t.hSuperficial);
  const Etouch = permissibleTouch(Cs, t.rhoSuperficial, t.tFalla, t.pesoPersona);
  const Estep = permissibleStep(Cs, t.rhoSuperficial, t.tFalla, t.pesoPersona);

  const area = malla.largo * malla.ancho;
  const condL = (malla.nConductoresL * malla.ancho) + (malla.nConductoresW * malla.largo);
  const condRods = malla.nVarillas * malla.longVarilla;
  const Ltotal = condL + condRods;
  const nL = malla.nConductoresL, nW = malla.nConductoresW;
  const n = Math.max(2, Math.round(Math.sqrt(nL * nW)));
  const D = (malla.largo / (nW - 1 || 1) + malla.ancho / (nL - 1 || 1)) / 2;
  // Diámetro real del conductor: tomado del calibre efectivamente dimensionado/
  // seleccionado en el módulo "Dimensionamiento Conductor" (área mm² → diámetro
  // circular equivalente), en vez de un valor fijo de referencia (4/0 AWG).
  const mm2Real = conductor ? computeConductor(conductor).seleccionado.mm2 : 107.2;
  const d = 2 * Math.sqrt(mm2Real / Math.PI) / 1000; // m, diámetro de sección circular equivalente
  const h = malla.profundidad;

  const { Em, Km, Ki, Kh } = meshVoltage({ rho, Ig: malla.iFalla, D, d, h, n, Ltotal });
  const { Es, Ks } = stepVoltageReal({ rho, Ig: malla.iFalla, D, h, n, Ltotal, Ki });

  return {
    rho, Cs, Etouch, Estep, Em, Es, Km, Ki, Kh, Ks, D, d, h, n, Ltotal, area, mm2Real,
    touchOk: Em <= Etouch, stepOk: Es <= Estep,
  };
}

// ---------------------------------------------------------------------
// MOTOR DE DIAGNÓSTICO Y RECOMENDACIÓN — TENSIONES DE PASO/CONTACTO
// Evalúa la sensibilidad de cada parámetro dimensionado hasta el momento
// (resistividad/gel, geometría de malla, conductor) y recomienda acciones
// concretas y priorizadas para alcanzar el cumplimiento, en vez de solo
// mostrar "no cumple". Es una heurística basada en la física del problema
// (no una búsqueda exhaustiva ni un solver), pensada para guiar al usuario.
// ---------------------------------------------------------------------
function diagnosticoTensiones(rT, malla, tens, gelActivo) {
  const recomendaciones = [];
  if (rT.touchOk && rT.stepOk) return recomendaciones;

  const ratioTouch = rT.Em / rT.Etouch;
  const ratioStep = rT.Es / rT.Estep;
  const peorRatio = Math.max(ratioTouch, ratioStep);

  // 1) Capa superficial de grava — efecto fuerte y barato sobre ambos límites admisibles
  if (tens.rhoSuperficial < 3000 || tens.hSuperficial < 0.15) {
    recomendaciones.push({
      accion: 'Aumentar la capa superficial de grava',
      detalle: `Subir ρₛ a ~3000-5000 Ω·m y/o el espesor a 0.15 m incrementa directamente E_touch y E_step admisibles (Cláusula 16). Es la acción de menor costo relativo.`,
      prioridad: 'alta', modulo: 'tensiones',
    });
  }

  // 2) Gel químico — si no está activo, reduce rho efectiva y por tanto Em/Es reales
  if (!gelActivo) {
    recomendaciones.push({
      accion: 'Activar el aditivo gel químico en las varillas',
      detalle: `Reduce la resistividad efectiva del terreno, lo que disminuye R_g, GPR y las tensiones reales E_m/E_s. Revísalo en el módulo "Aditivo Gel Químico".`,
      prioridad: 'alta', modulo: 'gel',
    });
  }

  // 3) Geometría de malla — más conductores / menor espaciamiento reduce Km y por tanto Em
  if (peorRatio > 1.3) {
    recomendaciones.push({
      accion: 'Reducir el espaciamiento entre conductores',
      detalle: `Agregar más conductores en "Resistencia de Malla" (aumentar nL/nW) reduce el espaciamiento D, lo que baja el factor geométrico Km y por tanto E_m. Actualmente D ≈ ${fmt(rT.D,1)} m.`,
      prioridad: peorRatio > 1.8 ? 'alta' : 'media', modulo: 'malla',
    });
  }

  // 4) Varillas adicionales — mejora Ltotal y distribución de corriente
  if (malla.nVarillas < 16) {
    recomendaciones.push({
      accion: 'Agregar varillas perimetrales adicionales',
      detalle: `Más electrodos verticales aumentan L_T (longitud total enterrada), reduciendo R_g, GPR y las tensiones reales proporcionalmente. Actualmente: ${malla.nVarillas} varillas.`,
      prioridad: 'media', modulo: 'malla',
    });
  }

  // 5) Profundidad de enterramiento
  if (malla.profundidad < 0.8) {
    recomendaciones.push({
      accion: 'Aumentar la profundidad de enterramiento',
      detalle: `Profundidades mayores (h) mejoran el factor Kh y reducen E_m. Actualmente h = ${fmt(malla.profundidad,2)} m; considera 0.8-1.0 m si las condiciones del terreno lo permiten.`,
      prioridad: 'baja', modulo: 'malla',
    });
  }

  // 6) Tiempo de despeje de falla — depende de protecciones, no solo de la malla
  if (tens.tFalla > 0.3) {
    recomendaciones.push({
      accion: 'Evaluar reducir el tiempo de despeje de falla',
      detalle: `Tiempos de despeje más rápidos (relés/protecciones más veloces) aumentan los límites admisibles (E_touch, E_step son inversamente proporcionales a √t). Actualmente t = ${fmt(tens.tFalla,2)} s — esto depende del sistema de protecciones, no solo del diseño de malla.`,
      prioridad: 'baja', modulo: 'tensiones',
    });
  }

  // Ordenar por prioridad: alta > media > baja
  const orden = { alta: 0, media: 1, baja: 2 };
  recomendaciones.sort((a,b) => orden[a.prioridad] - orden[b.prioridad]);
  return recomendaciones;
}



// ---------------------------------------------------------------------
// MOTOR DE CÁLCULO — DIMENSIONAMIENTO DE CONDUCTOR (IEEE 80-2013, Cl. 11, Ec. de Onderdonk)
// ---------------------------------------------------------------------
// Tabla de conductores de cobre comerciales: calibre AWG/kcmil → área en mm²
const CONDUCTOR_TABLE = [
  { calibre: '2 AWG',   mm2: 33.6  },
  { calibre: '1/0 AWG', mm2: 53.5  },
  { calibre: '2/0 AWG', mm2: 67.4  },
  { calibre: '3/0 AWG', mm2: 85.0  },
  { calibre: '4/0 AWG', mm2: 107.2 },
  { calibre: '250 kcmil', mm2: 126.7 },
  { calibre: '300 kcmil', mm2: 152.0 },
  { calibre: '350 kcmil', mm2: 177.3 },
  { calibre: '500 kcmil', mm2: 253.4 },
  { calibre: '750 kcmil', mm2: 380.0 },
];

// Ecuación de Onderdonk (IEEE 80-2013, Ec. 37): área mínima de conductor de cobre
// que soporta la corriente de falla sin fundirse, dado el tiempo de despeje.
// A[mm2] = I[kA] * sqrt( t / ( (TCAP/(t_r*alfa_r*rho_r)) * ln( (Km+Tm)/(Km+Ta) ) ) )^-1 ... forma simplificada usual:
// I = A * sqrt( (TCAP*10^-4 / (t*alfa_r*rho_r)) * ln( (Km+Tm)/(Km+Ta) ) )
// → despejando A para cobre blando comercial (97% IACS), constantes IEEE Tabla 7:
function onderdonkArea({ Ifalla_kA, tFalla, tempAmbiente, tempMaxFusion }) {
  // Constantes para cobre comercial blando (97.0% conductividad), IEEE 80 Tabla 7:
  const TCAP = 3.422;     // cal/(cm3·°C), capacidad térmica
  const alfa_r = 0.00381; // 1/°C, coef. térmico de resistividad a 20°C
  const rho_r = 1.78;     // µΩ·cm a 20°C
  const Ko = 234;         // °C, constante material
  const Km = Ko; // forma equivalente usada por IEEE 80 (Ko = -1/alfa_r + Tr)

  const Ta = tempAmbiente;     // °C
  const Tm = tempMaxFusion;    // °C, temperatura máxima admisible (ej. 450°C uniones soldadas, 1083°C fusión Cu)

  // A[mm²] = I[kA] / sqrt( (TCAP / (t*alfa_r*rho_r)) * ln( (Ko+Tm)/(Ko+Ta) ) ) * 197.3 (factor unidades IEEE)
  const lnTerm = Math.log((Ko + Tm) / (Ko + Ta));
  const denom = Math.sqrt((TCAP / (tFalla * alfa_r * rho_r)) * lnTerm);
  const areaMm2 = (Ifalla_kA * 197.4) / denom;
  return { areaMm2, lnTerm, denom, TCAP, alfa_r, rho_r, Ko };
}

function computeConductor(c) {
  const r = onderdonkArea({
    Ifalla_kA: c.iFalla / 1000,
    tFalla: c.tFalla,
    tempAmbiente: c.tempAmbiente,
    tempMaxFusion: c.tempMaxFusion,
  });
  // Sugerido automáticamente: el conductor comercial inmediatamente superior al área mínima calculada
  const sugerido = CONDUCTOR_TABLE.find(c2 => c2.mm2 >= r.areaMm2) || CONDUCTOR_TABLE[CONDUCTOR_TABLE.length - 1];

  // Selección efectiva: si el usuario eligió manualmente un calibre, se usa ese (siempre que cumpla
  // la sección mínima); si no hay selección manual o la elegida está subdimensionada, se usa el sugerido.
  let seleccionado = sugerido;
  let esSeleccionManual = false;
  let calibreSubdimensionado = null;
  if (c.calibreSeleccionado) {
    const elegido = CONDUCTOR_TABLE.find(c2 => c2.calibre === c.calibreSeleccionado);
    if (elegido) {
      if (elegido.mm2 >= r.areaMm2) {
        seleccionado = elegido;
        esSeleccionManual = true;
      } else {
        // El calibre elegido no cumple la sección mínima: se ignora y se reporta como subdimensionado
        calibreSubdimensionado = elegido;
        seleccionado = sugerido;
      }
    }
  }

  const margen = ((seleccionado.mm2 - r.areaMm2) / r.areaMm2) * 100;
  return { ...r, sugerido, seleccionado, esSeleccionManual, calibreSubdimensionado, margen };
}

function renderWennerResults() {
  const readings = state.wennerReadings.filter(r => r.a > 0 && r.r > 0);
  if (readings.length < 2) {
    return `<div class="locked-pane"><div class="lock-icon">⊘</div><h3>Datos insuficientes</h3><p>Ingresa al menos 2 lecturas válidas de espaciamiento y resistencia para calcular la resistividad aparente.</p></div>`;
  }

  const computed = readings.map(r => ({ ...r, rho: wennerApparent(r.a, r.r) }));
  const avgRho = computed.reduce((s,c)=>s+c.rho,0) / computed.length;
  const twoLayer = state.soilModel === 'estrat' ? estimateTwoLayer(readings) : null;

  // Diagrama SVG de electrodos Wenner
  const maxA = Math.max(...readings.map(r=>r.a));
  const svgW = 560, svgH = 150, margin = 40;
  const scale = (svgW - 2*margin) / (3 * maxA);
  const cx = svgW/2;
  const positions = [-1.5*maxA, -0.5*maxA, 0.5*maxA, 1.5*maxA].map(x => cx + x*scale);
  const groundY = 95;

  const diagram = `
    <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="${groundY}" x2="${svgW-20}" y2="${groundY}" stroke="#3a4250" stroke-width="1.5"/>
      ${Array.from({length:14}).map((_,i)=> `<line x1="${30+i*40}" y1="${groundY}" x2="${20+i*40}" y2="${groundY+12}" stroke="#2a313a" stroke-width="1"/>`).join('')}

      <line x1="${positions[1]}" y1="36" x2="${positions[1]}" y2="44" stroke="#5a6472" stroke-width="1"/>
      <text x="${(positions[0]+positions[1])/2}" y="30" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#E07A23" font-weight="600">a = ${fmt(maxA,1)} m</text>
      <text x="${cx}" y="${svgH-8}" text-anchor="middle" font-family="IBM Plex Sans" font-size="10" fill="#6b7480">Disposición de cuatro electrodos equiespaciados — corriente inyectada en C1/C2, potencial medido en P1/P2</text>
    </svg>

    <tr><td>${fmt(c.a,1)}</td><td>${fmt(c.r,1)}</td><td class="hl">${fmt(c.rho,1)}</td></tr>
  `).join('');

  return `

      <div class="stat-card primary">
        <div class="stat-label">Resistividad promedio</div>

        <div class="stat-note">Promedio aritmético de ρₐ sobre ${computed.length} lecturas</div>
      </div>

          <div class="stat-value">${fmt(twoLayer.rho1,1)}<span class="stat-unit">Ω·m</span></div>
          <div class="stat-note">Estimado de lecturas con 'a' pequeño</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Capa inferior ρ₂</div>
          <div class="stat-value">${fmt(twoLayer.rho2,1)}<span class="stat-unit">Ω·m</span></div>
          <div class="stat-note">Estimado de lecturas con 'a' grande</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Espesor estimado h</div>
          <div class="stat-value">${fmt(twoLayer.h,1)}<span class="stat-unit">m</span></div>
          <div class="stat-note">Punto donde ρₐ ≈ √(ρ₁·ρ₂)</div>
        </div>
      ` : ''}
    </div>

    <div class="section-title">Cálculo de resistividad aparente <span class="norm-tag">IEEE 81-2012 · Cl. 8.3</span></div>
    <p class="section-sub">Para cada espaciamiento, la resistividad aparente del suelo se obtiene de la lectura del telurómetro mediante la ecuación de Wenner (válida cuando la profundidad de los electrodos es pequeña respecto a 'a').</p>

    <div class="calc-block">
      <div class="eq">ρₐ <span class="op">=</span> 2 <span class="op">·</span> π <span class="op">·</span> a <span class="op">·</span> R</div>
      <table class="data-table">
        <thead><tr><th>a (m)</th><th>R medida (Ω)</th><th>ρₐ calculada (Ω·m)</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>

    ${twoLayer ? `
    <div class="section-title">Interpretación de suelo estratificado <span class="norm-tag">Método de asíntotas</span></div>
    <p class="section-sub">Aproximación de ingeniería: se toma el promedio de ρₐ en el tramo de 'a' pequeño como ρ₁ y en el tramo de 'a' grande como ρ₂. El espesor h se estima en el punto donde la curva cruza la media geométrica √(ρ₁·ρ₂). Para diseños críticos, valida con un software de inversión geofísica dedicado.</p>
    <div class="calc-block">
      <div class="calc-row"><div class="ck">ρ₁ (superior)</div><div class="cv">${fmt(twoLayer.rho1,1)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">ρ₂ (inferior)</div><div class="cv">${fmt(twoLayer.rho2,1)} Ω·m</div></div>
      <div class="calc-row final"><div class="ck">h estimado</div><div class="cv">${fmt(twoLayer.h,1)} m</div></div>
    </div>
    ` : ''}

    ${renderFundamentoTecnico('wenner')}

    <div class="footer-note">
      <b>Trazabilidad:</b> IEEE Std 81-2012 "IEEE Guide for Measuring Earth Resistivity, Ground Impedance, and Earth Surface Potentials of a Grounding System", Cláusula 8 (Método de Wenner). La interpretación de dos capas es una aproximación estándar de campo; no reemplaza un análisis de inversión completo para suelos altamente heterogéneos.
    </div>
  `;
}

// ---------------------------------------------------------------------
// MÓDULO 2: MALLA — INPUTS
// ---------------------------------------------------------------------

      <div class="field-group-label">Dimensiones</div>

        <div class="calc-row final" style="padding:10px 0;"><div class="ck">ρ promedio (Wenner, ${wReadings.length} lecturas)</div><div class="cv">${rhoMedido ? fmt(rhoMedido,1)+' Ω·m' : 'sin datos'}</div></div>
        <div class="hint">Trazabilidad profesional: este valor se recalcula automáticamente cada vez que editas las lecturas de campo en "Resistividad — Wenner". Para usar un valor distinto, cambia a modo Manual.</div>

// ---------------------------------------------------------------------
// MÓDULO 2: MALLA — RESULTADOS
// ---------------------------------------------------------------------
function renderMallaResults() {
  const m = state.malla;
  const gelInfo = state.gel.activo ? computeGel(state.gel, m.rho) : null;
  const r = computeMalla(m, gelInfo);
  const isSafe = r.gpr < 5000; // umbral ilustrativo de referencia, no normativo definitivo

  // Diagrama de malla (vista en planta)
  const svgW = 560, svgH = 280, pad = 50;
  const drawableW = svgW - 2*pad, drawableH = svgH - 2*pad;
  const scaleX = drawableW / m.largo;
  const scaleY = drawableH / m.ancho;
  const scale = Math.min(scaleX, scaleY);
  const gW = m.largo * scale, gH = m.ancho * scale;
  const ox = (svgW - gW)/2, oy = (svgH - gH)/2;

  let gridLines = '';
  for (let i=0;i<m.nConductoresL;i++){
    const y = oy + (i/(m.nConductoresL-1||1))*gH;
    gridLines += `<line x1="${ox}" y1="${y}" x2="${ox+gW}" y2="${y}" stroke="#E07A23" stroke-width="1.3" opacity="0.85"/>`;
  }
  for (let i=0;i<m.nConductoresW;i++){
    const x = ox + (i/(m.nConductoresW-1||1))*gW;
    gridLines += `<line x1="${x}" y1="${oy}" x2="${x}" y2="${oy+gH}" stroke="#E07A23" stroke-width="1.3" opacity="0.85"/>`;
  }
  let rods = '';
  const rodsPerSide = Math.max(1, Math.ceil(m.nVarillas/4));
  const perim = [];
  for(let i=0;i<m.nVarillas;i++){
    const t = i / m.nVarillas;
    const peri = 2*(gW+gH);
    let d = t*peri, x,y;
    if (d < gW) { x = ox+d; y = oy; }
    else if (d < gW+gH) { x = ox+gW; y = oy+(d-gW); }
    else if (d < 2*gW+gH) { x = ox+gW-(d-gW-gH); y = oy+gH; }
    else { x = ox; y = oy+gH-(d-2*gW-gH); }
    rods += `<circle cx="${x}" cy="${y}" r="3.4" fill="#2E7D32" stroke="#161a20" stroke-width="1"/>`;
  }

  return `
    <div class="diagram-card">
      <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
        <rect x="${ox}" y="${oy}" width="${gW}" height="${gH}" fill="none" stroke="#7a8593" stroke-width="2"/>
        ${gridLines}
        ${rods}
        <text x="${ox+gW/2}" y="${oy+gH+28}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#9aa3ad">${fmt(m.largo,1)} m × ${fmt(m.ancho,1)} m</text>
        <text x="${svgW-pad+12}" y="${oy+gH/2}" font-family="IBM Plex Sans" font-size="10" fill="#6b7480" transform="rotate(90 ${svgW-pad+12} ${oy+gH/2})" text-anchor="middle"></text>
        <g transform="translate(${ox},${oy-22})">
          <line x1="0" y1="0" x2="14" y2="0" stroke="#E07A23" stroke-width="2"/>
          <text x="19" y="3.5" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad">Conductor de malla</text>
          <circle cx="130" cy="0" r="3.4" fill="#2E7D32"/>
          <text x="138" y="3.5" font-family="IBM Plex Sans" font-size="10" fill="#9aa3ad">Electrodo vertical</text>
        </g>
      </svg>
    </div>

    <div class="result-hero">
      <div class="stat-card primary">
        <div class="stat-label">Resistencia de la malla R<sub>g</sub></div>
        <div class="stat-value">${fmt(r.Rg,3)}<span class="stat-unit">Ω</span></div>
        <div class="stat-note">Ecuación de Sverak — IEEE Std 80-2013, Cl. 14.2${gelInfo ? ' · con gel químico' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">GPR (Ground Potential Rise)</div>
        <div class="stat-value">${fmt(r.gpr,0)}<span class="stat-unit">V</span></div>
        <div class="stat-note">GPR = R<sub>g</sub> × I<sub>g</sub></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conductor total enterrado</div>
        <div class="stat-value">${fmt(r.Ltotal,1)}<span class="stat-unit">m</span></div>
        <div class="stat-note">Malla + varillas verticales</div>
      </div>
      <div class="stat-card${gelInfo ? ' primary' : ''}">
        <div class="stat-label">${gelInfo ? 'ρ efectiva (con gel)' : 'Área de la malla'}</div>
        <div class="stat-value">${gelInfo ? fmt(r.rhoUsado,1) : fmt(r.area,0)}<span class="stat-unit">${gelInfo ? 'Ω·m' : 'm²'}</span></div>
        ${gelInfo ? `<div class="stat-note">vs. ${fmt(m.rho,1)} Ω·m nativa · mejora ${fmt(gelInfo.mejoraPct,1)}%</div>` : ''}
      </div>
    </div>

    ${gelInfo ? `
    <div class="mockup-banner" style="background:#1e3a2d22; border-color:#2E7D3255;">
      <span class="mb-icon" style="color:var(--safe);">⚗</span>
      <span class="mb-text" style="color:#8fc991;"><b>Aditivo químico gel activo.</b> Este cálculo de malla usa la resistividad efectiva equivalente (${fmt(r.rhoUsado,1)} Ω·m) del módulo "Aditivo Gel", en vez de la resistividad nativa (${fmt(m.rho,1)} Ω·m). Desactívalo en ese módulo para ver el cálculo con suelo sin tratar.</span>
    </div>
    ` : ''}

    <div class="verdict-banner ${isSafe?'ok':'warn'}">
      <span class="v-icon">${isSafe?'✓':'!'}</span>
      <span>${isSafe
        ? 'El GPR calculado se encuentra dentro de un rango orientativo aceptable. Esto NO sustituye el cálculo formal de tensiones de paso y contacto admisibles (IEEE 80, Cl. 16), que debe completarse antes de aprobar el diseño.'
        : 'El GPR calculado es elevado. Se recomienda revisar la geometría de la malla, aumentar el número de electrodos/conductores, aplicar aditivo gel químico en las varillas, o verificar la resistividad del suelo antes de continuar con el diseño.'}</span>
    </div>

    <div class="section-title">Resistencia de la malla — método de Sverak <span class="norm-tag">IEEE 80-2013 · Cl. 14.2</span></div>
    <p class="section-sub">Fórmula simplificada de Sverak para mallas rectangulares, que considera el área cubierta, la longitud total de conductor y la profundidad de enterramiento.</p>
    <div class="calc-block">
      <div class="eq">R<sub>g</sub> <span class="op">=</span> ρ <span class="op">·</span> [ 1/L<sub>T</sub> <span class="op">+</span> (1/√(20A)) <span class="op">·</span> (1 + 1/(1+h√(20/A))) ]</div>
      <div class="calc-row"><div class="ck">ρ (resistividad)</div><div class="cv">${fmt(m.rho,1)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">A (área)</div><div class="cv">${fmt(r.area,1)} m²</div></div>
      <div class="calc-row"><div class="ck">L<sub>T</sub> (long. total)</div><div class="cv">${fmt(r.Ltotal,1)} m <span class="ghost">(malla: ${fmt(r.condL,1)} m + varillas: ${fmt(r.condRods,1)} m)</span></div></div>
      <div class="calc-row"><div class="ck">h (profundidad)</div><div class="cv">${fmt(m.profundidad,2)} m</div></div>
      <div class="calc-row"><div class="ck">Término 1/L<sub>T</sub></div><div class="cv">${fmt(r.term1,5)}</div></div>
      <div class="calc-row"><div class="ck">Término geométrico</div><div class="cv">${fmt(r.term2,5)}</div></div>
      <div class="calc-row final"><div class="ck">R<sub>g</sub> resultante</div><div class="cv">${fmt(r.Rg,3)} Ω</div></div>
    </div>

    <div class="section-title">Elevación de potencial de tierra (GPR)</div>
    <p class="section-sub">El GPR es el voltaje máximo que puede alcanzar la malla respecto a tierra remota durante una falla. Es el punto de partida para el análisis de tensiones de paso y contacto (módulo en desarrollo).</p>
    <div class="calc-block">
      <div class="eq">GPR <span class="op">=</span> R<sub>g</sub> <span class="op">·</span> I<sub>g</sub></div>
      <div class="calc-row"><div class="ck">I<sub>g</sub> (corriente de falla)</div><div class="cv">${fmt(m.iFalla,0)} A</div></div>
      <div class="calc-row"><div class="ck">t (duración de falla)</div><div class="cv">${fmt(m.tFalla,2)} s <span class="ghost">— usado en el módulo de tensiones admisibles</span></div></div>
      <div class="calc-row final"><div class="ck">GPR</div><div class="cv">${fmt(r.gpr,0)} V</div></div>
    </div>

    ${renderFundamentoTecnico('malla')}

    <div class="footer-note">
      <b>Trazabilidad:</b> IEEE Std 80-2013 "IEEE Guide for Safety in AC Substation Grounding", Cláusula 14.2 (ecuación de Sverak para resistencia de malla). El umbral de GPR mostrado es orientativo; la aceptación formal del diseño requiere comparar las tensiones de paso/contacto reales contra los límites de la Cláusula 16, módulo aún no incluido en este prototipo.
    </div>
  `;
}

// ---------------------------------------------------------------------
// MÓDULO 3: TENSIONES DE PASO/CONTACTO — INPUTS
// ---------------------------------------------------------------------

      <div class="field"><label>hₛ — espesor capa superficial <span class="unit">m</span></label><input type="number" id="tn-hs" value="${t.hSuperficial}" min="0" step="0.01"></div>
      <div class="hint">La capa de grava superficial reduce la corriente que circula por el cuerpo al aumentar la resistencia de contacto con el suelo. La resistividad del suelo nativo (ρ) se hereda automáticamente del módulo "Resistencia de Malla" — ver panel de geometría heredada abajo.</div>

    </div>
  `;
}

// ---------------------------------------------------------------------
// MÓDULO 3: TENSIONES DE PASO/CONTACTO — RESULTADOS
// ---------------------------------------------------------------------
function renderTensionesResults() {
  const t = state.tensiones;
  const r = computeTensiones(t, state.malla, state.conductor);
  const touchPct = Math.min(100, (r.Em / r.Etouch) * 100);
  const stepPct = Math.min(100, (r.Es / r.Estep) * 100);
  const barColor = (ok) => ok ? 'var(--safe)' : 'var(--danger)';
  const diagnostico = diagnosticoTensiones(r, state.malla, t, state.gel.activo);

  return `
    <div class="result-hero">
      <div class="stat-card" style="border-color:${r.touchOk?'var(--line)':'var(--danger)'};">
        <div class="stat-label">Tensión de contacto real E<sub>m</sub></div>
        <div class="stat-value" style="color:${r.touchOk?'var(--text)':'var(--danger)'}">${fmt(r.Em,1)}<span class="stat-unit">V</span></div>
        <div class="stat-note">Admisible: ${fmt(r.Etouch,1)} V (${t.pesoPersona} kg)</div>
      </div>
      <div class="stat-card" style="border-color:${r.stepOk?'var(--line)':'var(--danger)'};">
        <div class="stat-label">Tensión de paso real E<sub>s</sub></div>
        <div class="stat-value" style="color:${r.stepOk?'var(--text)':'var(--danger)'}">${fmt(r.Es,1)}<span class="stat-unit">V</span></div>
        <div class="stat-note">Admisible: ${fmt(r.Estep,1)} V (${t.pesoPersona} kg)</div>
      </div>
      <div class="stat-card primary">
        <div class="stat-label">Factor de reducción C<sub>s</sub></div>
        <div class="stat-value">${fmt(r.Cs,3)}</div>
        <div class="stat-note">Por capa superficial de grava</div>
      </div>
    </div>

    <div class="verdict-banner ${r.touchOk && r.stepOk ? 'ok' : 'warn'}">
      <span class="v-icon">${r.touchOk && r.stepOk ? '✓' : '!'}</span>
      <span>${r.touchOk && r.stepOk
        ? 'La malla cumple con los límites de tensión de contacto y de paso admisibles según IEEE 80, Cl. 16, para los parámetros ingresados.'
        : `La malla no cumple ${!r.touchOk && !r.stepOk ? 'la tensión de contacto ni la de paso' : !r.touchOk ? 'la tensión de contacto' : 'la tensión de paso'} admisible. Revisa las recomendaciones priorizadas a continuación, generadas en función de la geometría, gel y conductor ya dimensionados.`}</span>
    </div>

    ${diagnostico.length > 0 ? `
    <div class="section-title">Diagnóstico y recomendaciones <span class="norm-tag">Según diseño actual</span></div>
    <p class="section-sub">Acciones ordenadas por impacto esperado sobre el cumplimiento, calculadas a partir de la resistividad, gel químico, geometría de malla y conductor ya definidos en los módulos anteriores.</p>
    <div class="calc-block" style="padding:0; overflow:hidden;">
      ${diagnostico.map((rec, i) => {
        const colorPrio = rec.prioridad === 'alta' ? 'var(--danger)' : rec.prioridad === 'media' ? 'var(--warn)' : 'var(--text-faint)';
        const labelPrio = rec.prioridad === 'alta' ? 'Prioridad alta' : rec.prioridad === 'media' ? 'Prioridad media' : 'Prioridad baja';
        return `
        <div style="padding:14px 18px; ${i<diagnostico.length-1?'border-bottom:1px solid var(--line-soft);':''} display:flex; gap:14px; align-items:flex-start;">
          <div style="flex-shrink:0; width:6px; height:6px; border-radius:50%; background:${colorPrio}; margin-top:6px;"></div>
          <div style="flex:1;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:4px;">
              <span style="font-weight:600; color:var(--text); font-size:13px;">${rec.accion}</span>
              <span style="font-family:var(--mono); font-size:9.5px; color:${colorPrio}; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap;">${labelPrio}</span>
            </div>
            <div style="font-size:11.5px; color:var(--text-dim); line-height:1.5;">${rec.detalle}</div>
            <button class="secondary-btn" style="margin-top:8px; padding:5px 12px; font-size:11px;" data-tab-link="${rec.modulo}">Ir al módulo →</button>
          </div>
        </div>`;
      }).join('')}
    </div>
    ` : ''}

    <div class="section-title">Tensiones admisibles (límite de seguridad) <span class="norm-tag">IEEE 80-2013 · Cl. 16.4-16.5</span></div>
    <p class="section-sub">Voltaje máximo que el cuerpo humano puede tolerar sin fibrilación ventricular, según el modelo de energía de Dalziel, para una persona de ${t.pesoPersona} kg.</p>
    <div class="calc-block">
      <div class="eq">C<sub>s</sub> <span class="op">=</span> 1 <span class="op">−</span> 0.09(1 − ρ/ρₛ) / (2h<sub>s</sub> + 0.09)</div>
      <div class="calc-row"><div class="ck">ρ (suelo nativo)</div><div class="cv">${fmt(r.rho,1)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">ρₛ (capa superficial)</div><div class="cv">${fmt(t.rhoSuperficial,1)} Ω·m</div></div>
      <div class="calc-row"><div class="ck">h<sub>s</sub> (espesor capa)</div><div class="cv">${fmt(t.hSuperficial,2)} m</div></div>
      <div class="calc-row final"><div class="ck">C<sub>s</sub> resultante</div><div class="cv">${fmt(r.Cs,4)}</div></div>
    </div>
    <div class="calc-block">
      <div class="eq">E<sub>touch</sub> <span class="op">=</span> (1000 + 1.5·C<sub>s</sub>·ρₛ) · 0.157/√t</div>
      <div class="calc-row final"><div class="ck">E<sub>touch</sub> admisible</div><div class="cv">${fmt(r.Etouch,1)} V</div></div>
      <div class="eq" style="margin-top:14px;">E<sub>step</sub> <span class="op">=</span> (1000 + 6·C<sub>s</sub>·ρₛ) · 0.157/√t</div>
      <div class="calc-row final"><div class="ck">E<sub>step</sub> admisible</div><div class="cv">${fmt(r.Estep,1)} V</div></div>
    </div>

    <div class="section-title">Tensiones reales de la malla <span class="norm-tag">IEEE 80-2013 · Cl. 16.5</span></div>
    <p class="section-sub">Voltaje que efectivamente aparece entre la superficie y un punto a 1 m de un conductor de la malla (E<sub>m</sub>), o entre dos puntos a 1 m de distancia en superficie (E<sub>s</sub>), durante la falla.</p>
    <div class="calc-block">
      <div class="eq">E<sub>m</sub> <span class="op">=</span> ρ · K<sub>i</sub> · I<sub>g</sub> · K<sub>m</sub> / L<sub>T</sub></div>
      <div class="calc-row"><div class="ck">K<sub>m</sub> (factor geométrico)</div><div class="cv">${fmt(r.Km,4)}</div></div>
      <div class="calc-row"><div class="ck">K<sub>i</sub> (factor irregularidad)</div><div class="cv">${fmt(r.Ki,4)} <span class="ghost">(n≈${r.n})</span></div></div>
      <div class="calc-row"><div class="ck">D (espaciamiento promedio)</div><div class="cv">${fmt(r.D,2)} m</div></div>
      <div class="calc-row"><div class="ck">d (diámetro conductor)</div><div class="cv">${fmt(r.d*1000,1)} mm <span class="ghost">(ref. 4/0 AWG)</span></div></div>
      <div class="calc-row final"><div class="ck">E<sub>m</sub> resultante</div><div class="cv">${fmt(r.Em,1)} V</div></div>
    </div>
    <div class="calc-block">
      <div class="eq">E<sub>s</sub> <span class="op">=</span> ρ · K<sub>s</sub> · K<sub>i</sub> · I<sub>g</sub> / L<sub>T</sub></div>
      <div class="calc-row"><div class="ck">K<sub>s</sub> (factor geométrico de paso)</div><div class="cv">${fmt(r.Ks,4)}</div></div>
      <div class="calc-row final"><div class="ck">E<sub>s</sub> resultante</div><div class="cv">${fmt(r.Es,1)} V</div></div>
    </div>

    <div class="section-title">Comparación contra límites</div>
    <div class="calc-block">
      <div style="margin-bottom:16px;">
        <div style="display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-dim); margin-bottom:6px;">
          <span>Tensión de contacto</span><span>${fmt(r.Em,1)} V / ${fmt(r.Etouch,1)} V</span>
        </div>
        <div style="height:8px; background:var(--bg); border-radius:4px; overflow:hidden;">
          <div style="height:100%; width:${touchPct}%; background:${barColor(r.touchOk)};"></div>
        </div>
      </div>
      <div>
        <div style="display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-dim); margin-bottom:6px;">
          <span>Tensión de paso</span><span>${fmt(r.Es,1)} V / ${fmt(r.Estep,1)} V</span>
        </div>
        <div style="height:8px; background:var(--bg); border-radius:4px; overflow:hidden;">
          <div style="height:100%; width:${stepPct}%; background:${barColor(r.stepOk)};"></div>
        </div>
      </div>
    </div>

    ${renderFundamentoTecnico('tensiones')}

    <div class="footer-note">
      <b>Trazabilidad:</b> IEEE Std 80-2013, Cláusula 16 completa (16.3 a 16.6). Las ecuaciones de K<sub>m</sub>, K<sub>i</sub>, K<sub>s</sub> usadas corresponden a la forma simplificada de Sverak para mallas con electrodos perimetrales (K<sub>ii</sub>=1). El diámetro de conductor (d = ${fmt(r.d*1000,1)} mm) se toma del calibre ${state.conductor.calibreSeleccionado || 'sugerido automáticamente'} dimensionado en el módulo "Dimensionamiento Conductor" — si cambias el calibre ahí, este cálculo se actualiza.
    </div>
  `;
}

    <div class="field-group">
      <div class="field-group-label">Corriente y tiempo de falla</div>

    <div class="field-group">
      <div class="field-group-label">Temperaturas límite</div>

      <div class="field"><label>T<sub>m</sub> — temperatura máxima admisible <span class="unit">°C</span></label><input type="number" id="cd-tmax" value="${c.tempMaxFusion}" min="100" step="10"></div>
      <div class="hint">450°C es conservador para uniones soldadas exotérmicas (no recocer el conductor). 1083°C es el punto de fusión del cobre puro — usar solo si las uniones son atornilladas/prensadas y no soldadas.</div>

    <div class="field-group">
      <div class="field-group-label">Calibre del conductor a instalar</div>
      <select id="cd-calibre-select" class="role-select" style="width:100%; padding:9px 10px; font-size:13px;">
        <option value="" ${!c.calibreSeleccionado?'selected':''}>Automático — usar el sugerido (${r.sugerido.calibre})</option>
        ${CONDUCTOR_TABLE.map(row => {

          return `<option value="${row.calibre}" ${c.calibreSeleccionado===row.calibre?'selected':''} ${insuficiente?'disabled':''}>${row.calibre} — ${fmt(row.mm2,1)} mm²${insuficiente?' (insuficiente, no seleccionable)':''}</option>`;

      </select>
      <div class="hint">El calibre afecta directamente al conductor real instalado en la malla, y se propaga a Materiales y Costos. Los calibres por debajo de la sección mínima calculada (${fmt(r.areaMm2,2)} mm²) aparecen deshabilitados — no se pueden seleccionar.</div>
      ${r.calibreSubdimensionado ? `
      <div class="mockup-banner" style="background:#C6282814; border-color:#C6282855; margin-top:10px;">
        <span class="mb-icon" style="color:var(--danger);">✕</span>
        <span class="mb-text" style="color:#e08a87;"><b>Calibre ${r.calibreSubdimensionado.calibre} subdimensionado</b> (${fmt(r.calibreSubdimensionado.mm2,1)} mm² &lt; ${fmt(r.areaMm2,2)} mm² requeridos) — no puede usarse con la corriente de falla actual. Se aplicó automáticamente el calibre sugerido ${r.sugerido.calibre}.</span>
      </div>` : ''}

    <div class="field-group">
      <div class="field-group-label">Material del conductor</div>
      <div class="hint">Este módulo asume <b>cobre blando comercial (97% IACS)</b>, el material estándar en mallas de puesta a tierra según IEEE 80, Tabla 7. Otros materiales (acero cobreado, aluminio) requerirían constantes distintas — no incluidas en este prototipo.</div>

}
