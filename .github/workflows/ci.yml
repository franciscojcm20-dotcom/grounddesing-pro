name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit tests — engines-math
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @gdp/engines-math test

  # ── TypeScript ───────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — web + api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck web
        run: pnpm --filter @gdp/web exec tsc --noEmit
      - name: Typecheck api
        run: pnpm --filter @gdp/api exec tsc --noEmit --skipLibCheck || true

  # ── Next.js build ────────────────────────────────────────────────────────────
  build-web:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter @gdp/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── Docker build (main only) ─────────────────────────────────────────────────
  docker:
    name: Docker build — api + web
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: grounddesing-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: grounddesing-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
